        };

        const masterItinerary = [
            { id: 1, date: "Apr 18", title_en: "Heritage & Displacement: Bayswater", title_es: "Patrimonio y Desplazamiento: Bayswater", steps: 5000, 
              schedule: [
                { 
                  time: "19:00", dep_en: "18:50 (Base)", dep_es: "18:50 (Base)",
                  act_en: "Setup: Smart Hyde Park Inn", act_es: "Ajuste: Smart Hyde Park Inn",
                  loc: "Smart Hyde Park Inn London", 
                  note_en: "Establishing the architectural hub for the next 10 days.", note_es: "Estableciendo el centro arquitectónico para los próximos 10 días.", 
                  analysis: { 
                    cosmovision_en: "This space represents the 'Urban Micro-Cell'. It explores how dense, high-ceilinged Victorian domestic architecture—originally designed for a single wealthy family—can be surgically subdivided to house dozens of global nomads. It is a study in functionalist extreme efficiency where the historic skin is the only constant.", 
                    cosmovision_es: "Este espacio representa la 'Micro-Célula Urbana'. Explora cómo la densa arquitectura doméstica victoriana de techos altos, originalmente diseñada para una sola familia acomodada, puede ser subdividida quirúrgicamente para albergar a docenas de nómadas globales. Es un estudio de eficiencia funcionalista extrema donde la piel histórica es la única constante.", 
                    driver_en: "The primary driver is the 'democratization of the Grand Tour'. The pressure of London real estate forces a pragmatic repurposing of residential stock. It reflects the 21st-century reality of high-turnover mobility requiring low-cost entry points into high-value urban historical centers.", 
                    driver_es: "El motor principal es la 'democratización del Grand Tour'. La presión inmobiliaria de Londres obliga a una reutilización pragmática del parque residencial. Refleja la realidad del siglo XXI de movilidad de alta rotación que requiere puntos de entrada de bajo costo en centros históricos urbanos de alto valor.", 
                    aesthetics_en: "The aesthetic is a palimpsest of eras: a refined Stucco-fronted terrace outside masking a hyper-utilitarian ergonomics inside. Observe the contrast between the generous proportions of the entrance and the modular, compressed partitioning of the sleeping quarters.", 
                    aesthetics_es: "La estética es un palimpsesto de eras: una refinada terraza con frente de estuco en el exterior que oculta una ergonomía hiper-utilitaria en el interior. Observe el contraste entre las proporciones generosas de la entrada y la compartimentación modular y comprimida de los dormitorios." 
                  } 
                },
                { 
                  time: "19:45", dep_en: "19:35", dep_es: "19:35",
                  act_en: "Inquiry: Whiteleys Redevelopment", act_es: "Indagación: Redesarrollo de Whiteleys",
                  loc: "Whiteleys London", 
                  note_en: "Analyzing the 'Second Life' of the Department Store.", note_es: "Analizando la 'Segunda Vida' de los Grandes Almacenes.", 
                  analysis: { 
                    cosmovision_en: "Foster + Partners redefine the historic department store as a 'Vertical Village'. The vision treats the 1911 monument not as a museum, but as a living organism. The courtyard is reconceived as a central lung, allowing light to penetrate a shell that was once fossilized by retail logistics.", 
                    cosmovision_es: "Foster + Partners redefine los grandes almacenes históricos como una 'Villa Vertical'. La visión trata al monumento de 1911 no como un museo, sino como un organismo vivo. El patio se concibe de nuevo como un pulmón central, permitiendo que la luz penetre en una cáscara que una vez estuvo fosilizada por la logística comercial.", 
                    driver_en: "Driven by the 'Death of the High Street' and the rise of integrated luxury ecosystems. The project responds to the global demand for managed high-end residences that offer total living services (gym, dining, hospitality) within a singular historical envelope.", 
                    driver_es: "Impulsado por la 'Muerte de la Calle Principal' y el auge de los ecosistemas de lujo integrados. El proyecto responde a la demanda global de residencias de alta gama gestionadas que ofrecen servicios integrales de vida (gimnasio, restauración, hospitalidad) dentro de un envoltorio histórico singular.", 
                    aesthetics_en: "The aesthetic tension lies in the dialogue between the heavy Portland stone shell and the lightweight, transparent structural interventions. Look for the massive internal glass-and-timber atrium that inserts a digital-age geometry into the Edwardian masonry.", 
                    aesthetics_es: "La tensión estética reside en el diálogo entre la pesada cáscara de piedra de Portland y las intervenciones estructurales ligeras y transparentes. Busque el enorme atrio interno de vidrio y madera que inserta una geometría de la era digital en la mampostería eduardiana." 
                  } 
                }
              ], banksy_en: "The Painter (Notting Hill) - A stencil of a painter writing 'Banksy' under the Westway bridge.", banksy_es: "El Pintor (Notting Hill) - Un estarcido de un pintor escribiendo 'Banksy' bajo el puente de Westway." },
            
            { id: 2, date: "Apr 19", title_en: "Brutalism as Urban Strata", title_es: "Brutalismo como Estratos Urbanos", steps: 18000, 
              schedule: [
                { 
                  time: "11:00", dep_en: "09:30", dep_es: "09:30",
                  act_en: "Analysis: National Theatre", act_es: "Análisis: National Theatre",
                  loc: "National Theatre London", 
                  note_en: "Denys Lasdun's concrete symphony.", note_es: "La sinfonía de hormigón de Denys Lasdun.", 
                  analysis: { 
                    cosmovision_en: "Denys Lasdun famously described this as 'Urban Strata'. His vision was for a building that didn't stop at the sidewalk but became a man-made cliffside. The terraces are intentional extensions of the Thames path, inviting the citizen to roam the structure as if it were a natural park.", 
                    cosmovision_es: "Denys Lasdun describió esto famosamente como 'Estratos Urbanos'. Su visión era la de un edificio que no se detenía en la acera, sino que se convertía en un acantilado artificial. Las terrazas son extensiones intencionadas del camino del Támesis, invitando al ciudadano a recorrer la estructura como si fuera un parque natural.", 
                    driver_en: "The driver was post-war social democracy. The government wanted a 'National' theater that felt truly accessible, rejecting the gilded ornamentation of royal playhouses. It was meant to be a secular temple of culture where the building's guts (the structure) were as important as the performance.", 
                    driver_es: "El motor fue la socialdemocracia de posguerra. El gobierno quería un teatro 'Nacional' que se sintiera realmente accesible, rechazando la ornamentación dorada de los teatros reales. Debía ser un templo secular de la cultura donde las entrañas del edificio (la estructura) fueran tan importantes como la actuación.", 
                    aesthetics_en: "Brutalist perfection. Note the 'Béton Brut' finish: the concrete was poured into timber molds, leaving a permanent grain texture. The interplay of horizontal volumes and the absence of a primary facade force the viewer to engage with the building from multiple perspectives.", 
                    aesthetics_es: "Perfección brutalista. Note el acabado 'Béton Brut': el hormigón se vertió en moldes de madera, dejando una textura de veta permanente. El juego de volúmenes horizontales y la ausencia de una fachada principal obligan al espectador a interactuar con el edificio desde múltiples perspectivas." 
                  } 
                },
                { 
                  time: "14:30", dep_en: "14:00", dep_es: "14:00",
                  act_en: "Study: Westminster Hall", act_es: "Estudio: Westminster Hall",
                  loc: "Westminster Hall", 
                  note_en: "The medieval heart of British Law.", note_es: "El corazón medieval de la ley británica.", 
                  analysis: { 
                    cosmovision_en: "A physical manifestation of 'Divine Kingship' and ancient stability. The Hall represents the continuity of English law, designed to survive fire and war. It is a sacred vessel for administration, where architecture provides the gravity necessary for the state's authority.", 
                    cosmovision_es: "Una manifestación física de la 'Realeza Divina' y la estabilidad antigua. El Hall representa la continuidad de la ley inglesa, diseñado para sobrevivir al fuego y la guerra. Es un receptáculo sagrado para la administración, donde la arquitectura proporciona la gravedad necesaria para la autoridad del estado.", 
                    driver_en: "In 1393, Richard II demanded a space that would awe his subjects and host the grandest royal feasts. The driver was a structural ambition to create the largest clear-span roof in Europe, moving away from columns to allow for total visual dominance of the king's presence.", 
                    driver_es: "En 1393, Ricardo II exigió un espacio que asombrara a sus súbditos y albergara los banquetes reales más grandiosos. El motor fue una ambición estructural para crear el techo de luz libre más grande de Europa, alejándose de las columnas para permitir un dominio visual total de la presencia del rey.", 
                    aesthetics_en: "Perpendicular Gothic mastery. The Hammerbeam roof is the aesthetic zenith: a complex system of oak trusses carved with angels, creating a feeling of weightlessness. The stone walls anchor the space, but the timber roof draws the eye upward toward a celestial structural forest.", 
                    aesthetics_es: "Maestría del Gótico Perpendicular. El techo de Hammerbeam es el cénit estético: un sistema complejo de cerchas de roble talladas con ángeles, creando una sensación de ingravidez. Las paredes de piedra anclan el espacio, pero el techo de madera atrae la mirada hacia arriba, hacia un bosque estructural celestial." 
                  } 
                }
              ], banksy_en: "Leake Street Tunnel - Banksy's 'Cans Festival' site. A dynamic sanctuary for urban ink.", banksy_es: "Túnel de Leake Street - El sitio del 'Cans Festival' de Banksy. Un santuario dinámico para la tinta urbana." },

            { id: 3, date: "Apr 20", title_en: "High-Tech: The Square Mile", title_es: "High-Tech: La Milla Cuadrada", steps: 19000, 
              schedule: [
                { 
                  time: "10:00", dep_en: "08:45", dep_es: "08:45",
                  act_en: "Hito: Lloyd's Building", act_es: "Hito: Edificio Lloyd's",
                  loc: "Lloyd's of London Building", 
                  note_en: "Richard Rogers' 'Inside-Out' machine.", note_es: "La máquina 'Inside-Out' de Richard Rogers.", 
                  analysis: { 
                    cosmovision_en: "Architecture as a mechanical organism. Richard Rogers rejected the 'Box' in favor of 'Bowellism'—celebrating the building's internal systems as its external ornament. It views the city as a dynamic site of industrial metabolism that never stops.", 
                    cosmovision_es: "Arquitectura como organismo mecánico. Richard Rogers rechazó la 'Caja' en favor del 'Bowellism', celebrando los sistemas internos del edificio como su ornamento externo. Ve la ciudad como un sitio dinámico de metabolismo industrial que nunca se detiene.", 
                    driver_en: "The insurance market needed an unencumbered space—'The Room'—that could expand or contract without structural barriers. By moving ducts, lifts, and toilets to the exterior, the interior remains a pure 'Cathedral of Commerce' ready for technological evolution.", 
                    driver_es: "El mercado de seguros necesitaba un espacio sin obstáculos —'The Room'— que pudiera expandirse o contraerse sin barreras estructurales. Al mover conductos, ascensores y aseos al exterior, el interior permanece como una pura 'Catedral del Comercio' lista para la evolución tecnológica.", 
                    aesthetics_en: "Gleaming stainless steel, blue glass, and red ducting. The aesthetic is restless and hyper-industrial. Observe the 'Plug-in' service pods and the exposed cranes on top, emphasizing that the building is an ongoing, serviceable machine rather than a finished sculpture.", 
                    aesthetics_es: "Reluciente acero inoxidable, vidrio azul y conductos rojos. La estética es inquieta e hiper-industrial. Observe los módulos de servicio 'Plug-in' y las grúas expuestas en la parte superior, enfatizando que el edificio es una máquina útil en curso en lugar de una escultura terminada." 
                  } 
                },
                { 
                  time: "13:00", dep_en: "12:50", dep_es: "12:50",
                  act_en: "Inquiry: Garden at 120", act_es: "Indagación: Garden at 120",
                  loc: "The Garden at 120", 
                  note_en: "Reclaiming the horizon for the public.", note_es: "Reclamando el horizonte para el público.", 
                  analysis: { 
                    cosmovision_en: "Sky-democracy. This site reclaims the roof as a public common, challenging the notion that the best views of London belong only to corporate CEOs. It is a pocket of soft landscape floating within the hard steel grid of the financial center.", 
                    cosmovision_es: "Democracia en las alturas. Este sitio reclama la azotea como un bien público, desafiando la noción de que las mejores vistas de Londres pertenecen solo a los directores corporativos. Es un bolsillo de paisaje suave que flota dentro de la dura red de acero del centro financiero.", 
                    driver_en: "Driven by 'Section 106' agreements. The City planning authorities mandate developers to provide significant public realm in exchange for height density. The construction was a trade-off: a massive tower for the private sector in exchange for a garden for the citizen.", 
                    driver_es: "Impulsado por los acuerdos de la 'Sección 106'. Las autoridades de planificación de la City obligan a los promotores a proporcionar un espacio público significativo a cambio de densidad en altura. La construcción fue un intercambio: una torre masiva para el sector privado a cambio de un jardín para el ciudadano.", 
                    aesthetics_en: "A mix of horticultural softness and structural tectonic power. Wisteria pergolas, water rills, and concrete pavers create a serene environment that frames close-up, brutal reflections of the Shard and the Scalpel towers.", 
                    aesthetics_es: "Una mezcla de suavidad hortícola y poder tectónico estructural. Pérgolas de glicinas, riachuelos de agua y pavimentos de hormigón crean un ambiente sereno que enmarca reflejos brutales y cercanos de las torres Shard y Scalpel." 
                  } 
                }
              ], banksy_en: "Basquiat Murals (Beech Street) - Satirical commentary on policing art, protected by high-quality glass.", banksy_es: "Murales de Basquiat (Beech Street) - Comentario satírico sobre la vigilancia del arte, protegido por cristal de alta calidad." },
            
            { id: 4, date: "Apr 21", title_en: "Coastal Exoticism", title_es: "Exotismo Costero", steps: 20000, 
              schedule: [
                { 
                  time: "11:00", dep_en: "07:30 (Victoria Station)", dep_es: "07:30 (Victoria Station)",
                  act_en: "Inquiry: Royal Pavilion", act_es: "Indagación: Royal Pavilion",
                  loc: "Royal Pavilion Brighton", 
                  note_en: "John Nash's Indo-Saracenic dream.", note_es: "El sueño indo-sarraceno de John Nash.", 
                  analysis: { 
                    cosmovision_en: "Architecture as 'Escapist Fantasy'. This pavilion is a theatrical mask for the British monarchy, allowing the Prince Regent to play with the aesthetics of an idealized East while remaining in a coastal village. It is a visual rejection of London's rigid neoclassical order.", 
                    cosmovision_es: "La arquitectura como 'Fantasía Escapista'. Este pabellón es una máscara teatral para la monarquía británica, permitiendo al Príncipe Regente jugar con la estética de un Oriente idealizado mientras permanece en un pueblo costero. Es un rechazo visual del rígido orden neoclásico de Londres.", 
                    driver_en: "The hedonistic lifestyle of the future George IV and the arrival of the railway. The construction was fueled by the new accessibility of Brighton, turning it into a weekend playground for the elite seeking exotic stimulation and sea-water cures.", 
                    driver_es: "El estilo de vida hedonista del futuro Jorge IV y la llegada del ferrocarril. La construcción fue impulsada por la nueva accesibilidad de Brighton, convirtiéndola en un patio de recreo de fin de semana para la élite que buscaba estimulación exótica y curas de agua de mar.", 
                    aesthetics_en: "Indo-Saracenic shell over a pioneering industrial frame. Cast-iron columns (painted as bamboo) support massive onion domes and minarets. The interior is pure 'Chinoiserie': a dizzying display of dragons, golden chandeliers, and intense red silks.", 
                    aesthetics_es: "Cáscara indo-sarracena sobre una estructura industrial pionera. Columnas de hierro fundido (pintadas como bambú) sostienen enormes cúpulas acebolladas y minaretes. El interior es pura 'Chinoiserie': una exhibición vertiginosa de dragones, lámparas doradas e intensas sedas rojas." 
                  } 
                }
              ], banksy_en: "Prince Albert Pub - Site of the 'Kissing Policemen' replica. A pilgrimage for street art fans.", banksy_es: "Prince Albert Pub - Sitio de la réplica de los 'Policías Besándose'. Una peregrinación para los fans del arte urbano." },

            { id: 5, date: "Apr 22", title_en: "Enlightenment Planning", title_es: "Planificación de la Ilustración", steps: 16000, 
              schedule: [
                { 
                  time: "14:30", dep_en: "10:15 (Paddington)", dep_es: "10:15 (Paddington)",
                  act_en: "Hito: Roman Baths", act_es: "Hito: Roman Baths",
                  loc: "Roman Baths Bath", 
                  note_en: "Ancient hydrothermal engineering.", note_es: "Ingeniería hidrotérmica antigua.", 
                  analysis: { 
                    cosmovision_en: "The meeting of water and the divine. The Romans viewed the natural springs as a 'Liminal Space' where the underworld touched the earth. Architecture here served to channel this sacred energy through complex lead piping and monumental stone enclosures.", 
                    cosmovision_es: "El encuentro del agua y lo divino. Los romanos veían los manantiales naturales como un 'Espacio Liminal' donde el inframundo tocaba la tierra. La arquitectura aquí sirvió para canalizar esta energía sagrada a través de complejas tuberías de plomo y recintos de piedra monumentales.", 
                    driver_en: "Roman colonial socialization. The driver was to pacify and 'civilize' the province of Britannia by providing the luxuries of the capital. The baths were the 'Facebook' of the Roman world: a hub for political deals, hygiene, and ritual offerings.", 
                    driver_es: "Socialización colonial romana. El motor era pacificar y 'civilizar' la provincia de Britannia proporcionando los lujos de la capital. Las termas eran el 'Facebook' del mundo romano: un centro para acuerdos políticos, higiene y ofrendas rituales.", 
                    aesthetics_en: "A rich stratigraphy of time. Roman lead-lined pools and heavy masonry are layered under medieval vaults and 19th-century neoclassical terraces. The honey-colored Bath Stone unifies these centuries into a singular, warm atmospheric experience.", 
                    aesthetics_es: "Una rica estratigrafía del tiempo. Las piscinas romanas revestidas de plomo y la mampostería pesada están estratificadas bajo bóvedas medievales y terrazas neoclásicas del siglo XIX. La piedra de Bath de color miel unifica estos siglos en una experiencia atmosférica cálida y singular." 
                  } 
                },
                { 
                  time: "17:00", dep_en: "16:45", dep_es: "16:45",
                  act_en: "Analysis: Royal Crescent", act_es: "Análisis: Royal Crescent",
                  loc: "The Royal Crescent Bath", 
                  note_en: "John Wood the Younger's urban geometry.", note_es: "La geometría urbana de John Wood el Joven.", 
                  analysis: { 
                    cosmovision_en: "The 'Enlightenment in Stone'. John Wood sought to impose an ordered, mathematical sequence onto the organic British landscape. The Crescent represents the belief that nature can be tamed through the rigid application of classical Roman orders.", 
                    cosmovision_es: "La 'Ilustración en Piedra'. John Wood buscó imponer una secuencia ordenada y matemática sobre el paisaje británico orgánico. El Crescent representa la creencia de que la naturaleza puede ser domesticada mediante la aplicación rígida de los órdenes romanos clásicos.", 
                    driver_en: "Speculative real estate for the 18th-century elite. The driver was the need for high-prestige seasonal housing that looked like a singular monumental palace but functioned as individual townhouses for the visiting aristocracy.", 
                    driver_es: "Bienes raíces especulativos para la élite del siglo XVIII. El motor fue la necesidad de viviendas estacionales de alto prestigio que parecieran un palacio monumental singular pero funcionaran como casas individuales para la aristocracia visitante.", 
                    aesthetics_en: "Palladian harmony on a massive scale. 114 Ionic columns forming a continuous 500-foot sweep. The aesthetic power comes from the repetition and the rhythmic shadows of the colonnade against the glowing oolitic limestone.",

        async function fetchWithRetry(url, options, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error("API Error");
                    return await response.json();
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        }

        async function playAISummary(nodeIndex) {
            const dayData = masterItinerary.find(d => d.id === currentDayId);
            const node = dayData.schedule[nodeIndex];
            const btn = document.getElementById(`audio-btn-${nodeIndex}`);
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<div class="loader"></div> <span>${translations[currentLang].generating}</span>`;
            try {
                const textPrompt = `Narrate as a charismatic architect about ${node.loc}. Elaborate on: ${node.analysis['cosmovision_'+currentLang]}, ${node.analysis['driver_'+currentLang]}, ${node.analysis['aesthetics_'+currentLang]}. Language: ${currentLang === 'en' ? 'English' : 'Spanish'}. 120 words max. No markdown.`;
                const textResult = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: textPrompt }] }] })
                });
                const script = textResult.candidates[0].content.parts[0].text;
                const voice = currentLang === 'en' ? 'Zephyr' : 'Algieba';
                const ttsResult = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST', body: JSON.stringify({
                        contents: [{ parts: [{ text: script }] }],
                        generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } } },
                        model: "gemini-2.5-flash-preview-tts"
                    })
                });
                const base64Audio = ttsResult.candidates[0].content.parts[0].inlineData.data;
                const pcmData = Uint8Array.from(atob(base64Audio), c => c.charCodeAt(0));
                const wavBuffer = pcmToWav(pcmData.buffer, 24000);
                const blob = new Blob([wavBuffer], { type: 'audio/wav' });
                const url = URL.createObjectURL(blob);
                const audio = new Audio(url);
                audio.play();
                audio.onended = () => { btn.disabled = false; btn.innerHTML = originalText; };
            } catch (error) {
                btn.innerHTML = `⚠️ ${translations[currentLang].error}`;
                setTimeout(() => { btn.disabled = false; btn.innerHTML = originalText; }, 3000);
            }
        }

        function pcmToWav(pcmBuffer, sampleRate) {
            const buffer = new Int16Array(pcmBuffer);
            const wavHeader = new ArrayBuffer(44 + buffer.length * 2);
            const view = new DataView(wavHeader);
            const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
            writeString(0, 'RIFF'); view.setUint32(4, 32 + buffer.length * 2, true); writeString(8, 'WAVE');
            writeString(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true);
            writeString(36, 'data'); view.setUint32(40, buffer.length * 2, true);
            let offset = 44; for (let i = 0; i < buffer.length; i++, offset += 2) view.setInt16(offset, buffer[i], true);
            return wavHeader;
        }

                    datasets: [{ data: masterItinerary.map(d => d.steps), backgroundColor: '#e4e4e7', hoverBackgroundColor: '#e11d48', borderRadius: 4 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false, beginAtZero: true } } }
            });
        }

        function selectDay(id) {
            currentDayId = id;
            const data = masterItinerary.find(d => d.id === id);
            const t = translations[currentLang];
            masterItinerary.forEach(d => document.getElementById(`tab-${d.id}`).className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all opacity-40");
            const active = document.getElementById(`tab-${id}`);
            active.className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all active-tab";
            active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            document.getElementById('step-badge').innerText = `${data.steps.toLocaleString()} ${t.steps}`;
            document.getElementById('footer-day').innerText = `${data.date}: ${data['title_'+currentLang]}`;
            const content = document.getElementById('day-content');
            content.innerHTML = `
                <div class="mb-10">
                    <h3 class="text-4xl font-black text-zinc-900 leading-none tracking-tighter mb-3">${data['title_'+currentLang]}</h3>
                    <p class="text-[10px] font-black text-zinc-400 uppercase tracking-[0.25em]">${data.date} • ${t.fieldOps}</p>
                </div>
                <div class="space-y-12">
                    ${data.schedule.map((node, index) => `
                        <div class="timeline-item">
                            <div class="flex justify-between items-baseline mb-4">
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-black text-rose-600 bg-rose-50 px-3 py-1 rounded uppercase tracking-widest">${node.time}</span>
                                    <span class="departure-tag uppercase tracking-tighter">${t.dep}: ${node['dep_'+currentLang]}</span>
                                </div>
                                <span class="text-[9px] font-bold text-zinc-300 uppercase">Seq 0${index + 1}</span>
                            </div>
                            <h4 class="font-black text-zinc-800 text-xl leading-tight mb-2">${node['act_'+currentLang]}</h4>
                            <p class="text-sm text-zinc-500 mb-6 leading-relaxed italic">${node['note_'+currentLang]}</p>
                            <section class="arch-card mb-6">
                                <div class="grid grid-cols-1 gap-6 text-justify">
                                    <div>
                                        <span class="section-label">${t.cosmovision}</span>
                                        <p class="text-[12px] text-zinc-700 leading-relaxed">${node.analysis['cosmovision_'+currentLang]}</p>
                                    </div>
                                    <div class="border-t border-zinc-100 pt-4">
                                        <span class="section-label">${t.drivers}</span>
                                        <p class="text-[12px] text-zinc-700 leading-relaxed">${node.analysis['driver_'+currentLang]}</p>
                                    </div>
                                    <div class="border-t border-zinc-100 pt-4">
                                        <span class="section-label">${t.aesthetics}</span>
                                        <p class="text-[12px] text-zinc-800 leading-relaxed font-medium bg-zinc-50 rounded-lg p-3 border border-zinc-100">${node.analysis['aesthetics_'+currentLang]}</p>
                                    </div>
                                </div>
                            </section>
                            <div class="grid grid-cols-1 gap-3">
                                <button id="audio-btn-${index}" onclick="playAISummary(${index})" class="audio-btn shadow-md">🔊 <span>${t.listen}</span></button>
                                <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(node.loc)}" target="_blank" class="map-btn border border-zinc-200">📍 GPS Walk Navigation</a>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="banksy-box shadow-lg">
                    <div class="flex items-center gap-3 mb-5">
                        <div class="w-2 h-8 bg-rose-600"></div>
                        <span class="text-[11px] font-black uppercase tracking-[0.3em] text-rose-500">${t.hito}</span>
                    </div>
                    <p class="text-[15px] font-medium italic text-zinc-300 leading-relaxed">"${data['banksy_'+currentLang]}"</p>
                </div>
            `;
            if(loadChart) {
                loadChart.data.datasets[0].backgroundColor = masterItinerary.map(d => d.id === id ? '#e11d48' : '#e4e4e7');
                loadChart.update();
            }
        }

        window.onload = () => { renderTabs(); renderChart(); setLang('en'); };
    </script>
</body>
</html>
