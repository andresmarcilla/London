                    cosmovision_es: "El arte como monolito industrial. Tratado como una 'Nueva Montaña' pasando del poder horizontal a una red plegada cultural.", 
                    driver_en: "Gallery expansion needs for performance and education. Transformation of Southwark into a world-class cultural destination.", 
                    driver_es: "Necesidad de expansión de la galería para performance. Transformación de Southwark en destino cultural mundial.", 
                    aesthetics_en: "Blavatnik Building's perforated brick skin glowing like a pyramid. Challenging masonry rigidity through tactile sun play.", 
                    aesthetics_es: "Piel de ladrillo perforado del Edificio Blavatnik brillando como pirámide. Desafía la rigidez mediante el juego solar." 
                  } 
                },
                { time: "15:00", dep_en: "14:30", dep_es: "14:30", act_en: "Inquiry: The Elizabeth Line", act_es: "Indagación: Elizabeth Line", loc: "Paddington Station, Elizabeth Line", best_en: "Underground serenity", best_es: "Serenidad subterránea", note_en: "Engineering boulevard excellence.", note_es: "Excelencia de ingeniería en boulevard.", 
                  analysis: { 
                    cosmovision_en: "The 'Grand Subterranean Boulevard'. Transit as a monumental extension of the public realm rather than a tunnel. Integration of infrastructure and elegance.", 
                    cosmovision_es: "El 'Gran Boulevard Subterráneo'. El tránsito como extensión monumental del espacio público en lugar de un túnel.", 
                    driver_en: "Demand for high-speed cross-city capacity linking Heathrow with the City and Canary Wharf through a single artery.", 
                    driver_es: "Demanda de capacidad de alta velocidad uniendo Heathrow con la City y Canary Wharf mediante una única arteria.", 
                    aesthetics_en: "Hyper-Modern Rationalism. Sprayed concrete linings, minimalist signage, and totem pillars creating calm and high-tech serenity.", 
                    aesthetics_es: "Racionalismo hiper-moderno. Revestimientos de hormigón, señalética minimalista y pilares totem que crean calma." 
                  } 
                }
              ]
            }
        ];

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('btn-en').className = lang === 'en' ? 'text-[9px] font-bold px-3 py-1 rounded bg-zinc-900 text-white shadow-sm' : 'text-[9px] font-bold px-3 py-1 rounded bg-zinc-100 text-zinc-400';
            document.getElementById('btn-es').className = lang === 'es' ? 'text-[9px] font-bold px-3 py-1 rounded bg-zinc-900 text-white shadow-sm' : 'text-[9px] font-bold px-3 py-1 rounded bg-zinc-100 text-zinc-400';
            document.getElementById('metabolism-label').innerText = translations[lang].metabolism;
            document.getElementById('op-zone-label').innerText = translations[lang].opZone;
            selectDay(currentDayId);
        }

        function renderTabs() {
            const container = document.getElementById('tab-container');
            container.innerHTML = '';
            masterItinerary.forEach(d => {
                const b = document.createElement('button');
                b.id = `tab-${d.id}`;
                b.className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all opacity-40";
                b.innerText = d.date;
                b.onclick = () => selectDay(d.id);
                container.appendChild(b);
            });
        }

        let loadChart;
        function renderChart() {
            if (typeof Chart === 'undefined') return;
            const ctx = document.getElementById('loadChart').getContext('2d');
            if (loadChart) loadChart.destroy();
            loadChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: masterItinerary.map(d => d.date),
                    datasets: [{ data: masterItinerary.map(d => d.steps), backgroundColor: '#e4e4e7', hoverBackgroundColor: '#e11d48', borderRadius: 4 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false, beginAtZero: true } } }
            });
        }

        function selectDay(id) {
            currentDayId = id;
            const data = masterItinerary.find(d => d.id === id);
            const t = translations[currentLang];
            
            masterItinerary.forEach(d => {
                const el = document.getElementById(`tab-${d.id}`);
                if (el) el.className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all opacity-40";
            });
            const active = document.getElementById(`tab-${id}`);
            if (active) {
                active.className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all active-tab";
                active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }

            document.getElementById('step-badge').innerText = `${data.steps.toLocaleString()} ${t.steps}`;
            document.getElementById('footer-day').innerText = `${data.date}: ${data['title_'+currentLang]}`;
            
            const content = document.getElementById('day-content');
            const scheduleHtml = data.schedule.map((node, index) => {
                const bestTimeVal = node['best_'+currentLang] ?? "N/A";
                const noteVal = node['note_'+currentLang] ?? "";
                return `
                    <div class="timeline-item">
                        <div class="flex justify-between items-baseline mb-4">
                            <div class="flex flex-col gap-1 min-w-0">
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-black text-rose-600 bg-rose-50 px-3 py-1 rounded uppercase tracking-widest">${node.time}</span>
                                    <span class="departure-tag uppercase tracking-tighter">${t.dep}: ${node['dep_'+currentLang]}</span>
                                </div>
                                <span class="best-time-badge">🕒 ${t.bestTime}: ${bestTimeVal}</span>
                            </div>
                            <span class="text-[9px] font-bold text-zinc-300 uppercase flex-shrink-0">Seq 0${index + 1}</span>
                        </div>
                        <h4 class="font-black text-zinc-800 text-xl leading-tight mb-2">${node['act_'+currentLang]}</h4>
                        ${noteVal ? `<p class="text-sm text-zinc-500 mb-6 leading-relaxed italic">${noteVal}</p>` : ''}
                        <section class="arch-card mb-6">
                            <div class="grid grid-cols-1 gap-8 text-justify long-desc">
                                <div>
                                    <span class="section-label">${t.cosmovision}</span>
                                    <p>${node.analysis['cosmovision_'+currentLang]}</p>
                                </div>
                                <div class="border-t border-zinc-100 pt-6">
                                    <span class="section-label">${t.drivers}</span>
                                    <p>${node.analysis['driver_'+currentLang]}</p>
                                </div>
                                <div class="border-t border-zinc-100 pt-6">
                                    <span class="section-label">${t.aesthetics}</span>
                                    <p class="font-medium text-zinc-900 bg-zinc-50 rounded-xl p-4 border border-zinc-100">${node.analysis['aesthetics_'+currentLang]}</p>
                                </div>
                            </div>
                        </section>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(node.loc)}" target="_blank" class="map-btn border border-zinc-200">📍 GPS Walk Navigation</a>
                    </div>
                `;
            }).join('');

            const banksyText = data['banksy_'+currentLang] ?? "N/A";
            const banksyLoc = data.banksy_loc ?? "N/A";

            content.innerHTML = `
                <div class="mb-10">
                    <h3 class="text-3xl font-black text-zinc-900 leading-none tracking-tighter mb-3">${data['title_'+currentLang]}</h3>
                    <p class="text-[10px] font-black text-zinc-400 uppercase tracking-[0.25em]">${data.date} • ${t.fieldOps}</p>
                </div>
                <div class="space-y-12">
                    ${scheduleHtml}
                </div>
                <div class="banksy-box shadow-lg">
                    <div class="flex items-center gap-3 mb-5">
                        <div class="w-2 h-8 bg-rose-600"></div>
                        <span class="text-[11px] font-black uppercase tracking-[0.3em] text-rose-500">${t.hito}</span>
                    </div>
                    <p class="text-[15px] font-medium italic text-zinc-300 leading-relaxed mb-4">"${banksyText}"</p>
                    <div class="pt-4 border-t border-white/10">
                        <span class="section-label text-zinc-500">${t.location}</span>
                        <p class="text-[12px] font-mono text-white mb-4">${banksyLoc}</p>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(banksyLoc)}" target="_blank" class="map-btn banksy-nav-btn shadow-none">📍 Navigate to Piece</a>
                    </div>
                </div>
            `;
            
            if (typeof Chart !== 'undefined' && loadChart) {
                loadChart.data.datasets[0].backgroundColor = masterItinerary.map(d => d.id === id ? '#e11d48' : '#e4e4e7');
                loadChart.update();
            }
        }

        function getAutoDay() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const date = now.getDate();
            if (year === 2026 && month === 3) {
                if (date >= 18 && date <= 27) return date - 17;
            }
            return 1;
        }

        window.onload = () => { 
            renderTabs(); 
            const defaultDay = getAutoDay();
            setTimeout(() => {
                renderChart(); 
                setLang('en');
                selectDay(defaultDay);
            }, 150);
        };
    </script>
</body>
</html>
