                { time: "19:00", dep_en: "18:50 (Base)", dep_es: "18:50 (Base)", act_en: "Setup: Smart Hyde Park View", act_es: "Check-in: Smart Hyde Park View", loc: "Smart Hyde Park View, 16 Leinster Terrace, London", best_en: "Evening arrival", best_es: "Llegada vespertina", note_en: "Establishing base camp at Leinster Terrace.", note_es: "Estableciendo la base en Leinster Terrace.",
                  analysis: { 
                    cosmovision_en: "This site functions as a 'Micro-Cell' within the dense urban tissue of Bayswater. It illustrates the late-capitalist adaptation of 19th-century domesticity—structures originally built for single aristocratic families—now surgically subdivided to house dozens of global nomads. It is architecture as a container of ephemeral presence and shared urban memory, where the private realm is compressed to its absolute functional minimum to facilitate a life in transit.",

                    driver_en: "Driven by the 'Grand Tour Democratization' and the relentless pressure of London real estate. Historical zones like Bayswater force a pragmatic repurposing of residential stock to maximize occupancy without altering the protected Stucco-fronted skin. This tension between conservation laws and capitalist utility is the primary economic engine of the modern hospitality sector in Central London.",

                { time: "19:45", dep_en: "19:35", dep_es: "19:35", act_en: "Inquiry: Whiteleys Redevelopment", act_es: "Inspección: Whiteleys", loc: "Whiteleys London", best_en: "Blue hour reflections", best_es: "Reflejos de hora azul", note_en: "Foster + Partners' study in high-end adaptive reuse.", note_es: "Estudio de Foster + Partners sobre reutilización adaptativa.",
                  analysis: {

                    driver_es: "Impulsado por la 'Muerte de la Calle Principal' y la obsolescencia del modelo de grandes almacenes. El proyecto responde a la demanda global de residencias de alta gama que ofrecen servicios integrales (bienestar, restauración) dentro de un envoltorio histórico singular, asegurando la supervivencia del monumento de Grado II mediante inversión de lujo.", 
                    aesthetics_en: "A high-tech insertion of glass and timber into the 1911 Grade II masonry. The aesthetic tension lies in the central atrium, where light is treated as a construction material that dematerializes the heavy neoclassical stone shell. Observe how the new structural grid interacts with the original colonnade, creating a dialogue between the monumental past and the transparent digital future.",

              schedule: [
                { time: "11:00", dep_en: "09:30", dep_es: "09:30", act_en: "Analysis: National Theatre", act_es: "Análisis: National Theatre", loc: "National Theatre London", best_en: "High noon for shadows", best_es: "Mediodía para sombras", note_en: "Denys Lasdun's concrete symphony.", note_es: "La sinfonía de hormigón de Denys Lasdun.",
                  analysis: { 
                    cosmovision_en: "Denys Lasdun's vision of 'Urban Strata' treats architecture as a man-made geological formation. The building doesn't stop at the sidewalk but becomes an artificial cliffside that invites the public to move vertically through the city. The terraces are intentional extensions of the Thames path, effectively blurring the lines between the formal institution and the democratic riverfront.", 
                    cosmovision_es: "La visión de Denys Lasdun de 'Estratos Urbanos' trata la arquitectura como formación geológica artificial. El edificio no se detiene en la acera, sino que se convierte en un acantilado que invita al público a moverse verticalmente. Las terrazas son extensiones intencionadas del camino del Támesis, desdibujando las líneas entre la institución y el frente del río.", 
                    driver_en: "Post-war social democracy and the need for secular temples of culture. The government wanted a theatre that rejected the elitism of gilded West End boxes, focusing instead on visible structural honesty and public accessibility. It was a mission to create a 'home for the arts' that felt intellectually transparent and physically rugged.", 
                    driver_es: "La socialdemocracia de posguerra y la necesidad de templos seculares. El gobierno quería un teatro que rechazara el elitismo de los palcos dorados, centrándose en una honestidad estructural visible y accesibilidad pública. Fue una misión para crear un 'hogar para las artes' intelectualmente transparente y físicamente robusto.", 
                    aesthetics_en: "Exemplary Béton Brut with board-marked concrete mirroring wood grain. The interplay of interlocking horizontal volumes and the absence of a primary facade force the viewer to engage with the building as a cinematic landscape of light and deep, dramatic shadow. It is the definitive expression of material weight vs vertical flow.",

                { time: "14:30", dep_en: "14:15", dep_es: "14:15", act_en: "Study: Westminster Hall", act_es: "Estudio: Westminster Hall", loc: "Westminster Hall", best_en: "Interior daylight flux", best_es: "Flujo de luz interior", note_en: "Medieval heart of British Sovereignty.", note_es: "Corazón medieval de la soberanía británica.",
                  analysis: { 
                    cosmovision_en: "A physical manifestation of 'Divine Kingship' and ancient structural stability, designed to endure as the heavy physical heart of the British State. It represents the continuity of English law, where architecture provides the necessary gravity for the exercise of authority, creating a space that feels both legally sacred and structurally eternal.", 
                    cosmovision_es: "Manifestación física de la 'Realeza Divina' y estabilidad estructural antigua, diseñada para perdurar como el corazón físico del Estado británico. Representa la continuidad de la ley inglesa, donde la arquitectura proporciona la gravedad necesaria para el ejercicio de la autoridad.", 
                    driver_en: "The 1393 ambition of Richard II to create the largest clear-span roof in medieval Europe. The driver was to move away from intrusive central columns, allowing total visual dominance of the hall during royal banquets and trials, demonstrating that the King's law was as expansive and unshakeable as the roof above.", 
                    driver_es: "La ambición de 1393 de Ricardo II de crear el techo de luz libre más grande de la Europa medieval. El motor fue alejarse de las columnas centrales, permitiendo el dominio visual total durante banquetes y juicios, demostrando que la ley del Rey era tan expansiva e inquebrantable como el techo.", 
                    aesthetics_en: "Perpendicular Gothic mastery; the Hammerbeam oak roof (1393) uses a complex system of trusses carved with angels to create a celestial feeling of weightlessness above massive, anchoring stone walls. The intricate carving transforms a heavy administrative vessel into a structural forest of oak and history.", 
                    aesthetics_es: "Maestría del Gótico Perpendicular; el techo de Hammerbeam de roble (1393) utiliza un sistema complejo de cerchas talladas con ángeles para crear una sensación de ingravidez celestial. El tallado intrincado transforma un pesado recinto administrativo en un bosque estructural de roble e historia."

            { id: 3, date: "Apr 20", title_en: "Inside-Out: High-Tech Machine", title_es: "Inside-Out: Máquina High-Tech", steps: 19000,

                  analysis: { 
                    cosmovision_en: "Architecture as a mechanical organism. Richard Rogers rejected the static 'Box' in favor of 'Bowellism'—celebrating the building's internal systems (stairs, elevators, ducts) as external ornament. The building is a living machine that metabolizes data, where the architecture is defined by the flux of services rather than static walls. It represents a hyper-functionalist future where transparency and flexibility are the primary legal and structural currencies.", 
                    cosmovision_es: "Arquitectura como organismo mecánico. Richard Rogers rechazó la 'Caja' estática en favor del 'Bowellism', celebrando los sistemas internos (escaleras, ascensores, conductos) como ornamento externo. El edificio es una máquina viva que metaboliza datos, definida por el flujo de servicios. Representa un futuro hiper-funcionalista donde la transparencia y la flexibilidad son las divisas principales.",

                    aesthetics_en: "Gleaming stainless steel, blue glass, and external modular service pods. The aesthetic is hyper-industrial and restless, emphasized by the exposed cranes on top that signal a building that is never truly finished, always ready for the next technological upgrade. It is a visual manifesto of 'high-tech' honesty.", 
                    aesthetics_es: "Acero inoxidable reluciente, vidrio azul y módulos de servicio externos. La estética es hiper-industrial e inquieta, enfatizada por las grúas expuestas arriba que señalan un edificio que nunca está terminado, siempre listo para la próxima actualización tecnológica. Es un manifiesto visual de honestidad técnica."

                { time: "13:00", dep_en: "12:45", dep_es: "12:45", act_en: "Inquiry: Garden at 120", act_es: "Indagación: Garden at 120", loc: "The Garden at 120", best_en: "Sun on the Scalpel", best_es: "Sol sobre el Scalpel", note_en: "Sky-democracy above the City.", note_es: "Democracia en el cielo de la City.",
                  analysis: { 
                    cosmovision_en: "Sky-democracy. This project reclaims the horizon as a public common path, challenging the notion that high-level views belong only to corporations. It is a pocket of soft landscape floating within the hard steel grid of the financial center, offering the citizen a sensory escape and a new topological ground level for urban contemplation.", 
                    cosmovision_es: "Democracia en el cielo. Este proyecto reclama el horizonte como un bien público, desafiando la noción de que las vistas de altura pertenecen solo a las corporaciones. Es un bolsillo de paisaje suave que flota dentro de la dura red de acero del centro financiero, ofreciendo al ciudadano un escape sensorial.", 
                    driver_en: "City planning mandates (Section 106) forcing private developers to provide high-quality public green space in exchange for skyscraper height permits in the dense Square Mile. The construction was a legal and social trade-off: a massive corporate tower for the private sector in exchange for a garden for the urban collective.", 
                    driver_es: "Mandatos urbanísticos (Sección 106) que obligan a los promotores a dar espacio verde público de alta calidad a cambio de permisos de altura. La construcción fue un intercambio legal y social: una torre corporativa masiva a cambio de un jardín para el colectivo urbano.", 
                    aesthetics_en: "Horticultural wisteria meeting rigid financial steel. Timber pergolas and water features frame brutalist, close-up reflections of the Gherkin and the Scalpel towers, blending organic life with the tectonic power of the Square Mile. It is architecture as a frame for London's vertical reflections.", 
                    aesthetics_es: "Glicinas hortícolas encontrando acero financiero rígido. Pérgolas de madera y riachuelos enmarcan reflejos brutalistas y cercanos de las torres Gherkin y Scalpel, mezclando la vida orgánica con el poder tectónico. Es arquitectura como marco sofisticado para los reflejos verticales de Londres."

                  analysis: { 
                    cosmovision_en: "Architecture as a theatrical mask. John Nash designed this to be a psychological escape for George IV, allowing the monarchy to play with idealized Eastern aesthetics while remaining within a day's ride of London. It is a visual rejection of the capital's rigid neoclassical order, reflecting the Regency era's obsession with the 'Exotic Other'.", 
                    cosmovision_es: "La arquitectura como máscara teatral. John Nash diseñó esto como un escape psicológico para Jorge IV, permitiendo que la monarquía jugara con una estética oriental idealizada. Es un rechazo visual del rígido orden neoclásico que dominaba el centro de Londres, reflejando la obsesión de la era de la Regencia por el 'Otro Exótico'.",

            { id: 5, date: "Apr 22", title_en: "Scientific Order: Bath", title_es: "Orden Científico: Bath", steps: 16000,

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('btn-en').className = lang === 'en' ? 'text-[9px] font-bold px-3 py-1 rounded bg-zinc-900 text-white shadow-sm' : 'text-[9px] font-bold px-3 py-1 rounded bg-zinc-100 text-zinc-400';
            document.getElementById('btn-es').className = lang === 'es' ? 'text-[9px] font-bold px-3 py-1 rounded bg-zinc-900 text-white shadow-sm' : 'text-[9px] font-bold px-3 py-1 rounded bg-zinc-100 text-zinc-400';
            document.getElementById('metabolism-label').innerText = translations[lang].metabolism;
            document.getElementById('op-zone-label').innerText = translations[lang].opZone;
            selectDay(currentDayId);
        }

        function renderTabs() {
            const container = document.getElementById('tab-container');
            container.innerHTML = '';
            masterItinerary.forEach(d => {
                const b = document.createElement('button');
                b.id = `tab-${d.id}`;
                b.className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all opacity-40";
                b.innerText = d.date;
                b.onclick = () => selectDay(d.id);
                container.appendChild(b);
            });
        }

        let loadChart;
        function renderChart() {
            if (typeof Chart === 'undefined') return;
            const ctx = document.getElementById('loadChart').getContext('2d');
            if (loadChart) loadChart.destroy();
            loadChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: masterItinerary.map(d => d.date),
                    datasets: [{ data: masterItinerary.map(d => d.steps), backgroundColor: '#e4e4e7', hoverBackgroundColor: '#e11d48', borderRadius: 4 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false, beginAtZero: true } } }
            });
        }

        function selectDay(id) {
            currentDayId = id;
            const data = masterItinerary.find(d => d.id === id);
            const t = translations[currentLang];
            
            masterItinerary.forEach(d => {
                const el = document.getElementById(`tab-${d.id}`);
                if (el) el.className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all opacity-40";
            });
            const active = document.getElementById(`tab-${id}`);
            if (active) {
                active.className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all active-tab";
                active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }

            document.getElementById('step-badge').innerText = `${data.steps.toLocaleString()} ${t.steps}`;
            document.getElementById('footer-day').innerText = `${data.date}: ${data['title_'+currentLang]}`;
            
            const content = document.getElementById('day-content');
            
            const scheduleHtml = data.schedule.map((node, index) => {
                const bestTimeVal = node['best_'+currentLang] ?? "N/A";
                const noteVal = node['note_'+currentLang] ?? "";
                return `
                    <div class="timeline-item">
                        <div class="flex justify-between items-baseline mb-4">
                            <div class="flex flex-col gap-1 min-w-0">
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-black text-rose-600 bg-rose-50 px-3 py-1 rounded uppercase tracking-widest">${node.time}</span>
                                    <span class="departure-tag uppercase tracking-tighter">${t.dep}: ${node['dep_'+currentLang]}</span>
                                </div>
                                <span class="best-time-badge">🕒 ${t.bestTime}: ${bestTimeVal}</span>
                            </div>
                            <span class="text-[9px] font-bold text-zinc-300 uppercase flex-shrink-0">Seq 0${index + 1}</span>
                        </div>
                        <h4 class="font-black text-zinc-800 text-xl leading-tight mb-2">${node['act_'+currentLang]}</h4>
                        ${noteVal ? `<p class="text-sm text-zinc-500 mb-6 leading-relaxed italic">${noteVal}</p>` : ''}
                        <section class="arch-card mb-6">
                            <div class="grid grid-cols-1 gap-8 text-justify long-desc">
                                <div>
                                    <span class="section-label">${t.cosmovision}</span>
                                    <p>${node.analysis['cosmovision_'+currentLang]}</p>
                                </div>
                                <div class="border-t border-zinc-100 pt-6">
                                    <span class="section-label">${t.drivers}</span>
                                    <p>${node.analysis['driver_'+currentLang]}</p>
                                </div>
                                <div class="border-t border-zinc-100 pt-6">
                                    <span class="section-label">${t.aesthetics}</span>
                                    <p class="font-medium text-zinc-900 bg-zinc-50 rounded-xl p-4 border border-zinc-100">${node.analysis['aesthetics_'+currentLang]}</p>
                                </div>
                            </div>
                        </section>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(node.loc)}" target="_blank" class="map-btn border border-zinc-200">📍 GPS Walk Navigation</a>
                    </div>
                `;
            }).join('');

            const banksyText = data['banksy_'+currentLang] ?? "N/A";
            const banksyLoc = data.banksy_loc ?? "N/A";

            content.innerHTML = `
                <div class="mb-10">
                    <h3 class="text-3xl font-black text-zinc-900 leading-none tracking-tighter mb-3">${data['title_'+currentLang]}</h3>
                    <p class="text-[10px] font-black text-zinc-400 uppercase tracking-[0.25em]">${data.date} • ${t.fieldOps}</p>
                </div>
                <div class="space-y-12">
                    ${scheduleHtml}
                </div>
                <div class="banksy-box shadow-lg">
                    <div class="flex items-center gap-3 mb-5">
                        <div class="w-2 h-8 bg-rose-600"></div>
                        <span class="text-[11px] font-black uppercase tracking-[0.3em] text-rose-500">${t.hito}</span>
                    </div>
                    <p class="text-[15px] font-medium italic text-zinc-300 leading-relaxed mb-4">"${banksyText}"</p>
                    <div class="pt-4 border-t border-white/10">
                        <span class="section-label text-zinc-500">${t.location}</span>
                        <p class="text-[12px] font-mono text-white mb-4">${banksyLoc}</p>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(banksyLoc)}" target="_blank" class="map-btn banksy-nav-btn">📍 Navigate to Piece</a>
                    </div>
                </div>
            `;
            
            if (typeof Chart !== 'undefined' && loadChart) {
                loadChart.data.datasets[0].backgroundColor = masterItinerary.map(d => d.id === id ? '#e11d48' : '#e4e4e7');
                loadChart.update();
            }
        }

        // Lógica de detección automática del día actual
        function getAutoDay() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth(); // 0-indexed, Abril es 3
            const date = now.getDate();

            // Rango del itinerario: 18 de Abril de 2026 al 27 de Abril de 2026
            if (year === 2026 && month === 3) {
                if (date >= 18 && date <= 27) {
                    return date - 17; // Abril 18 -> ID 1, Abril 19 -> ID 2, etc.
                }
            }
            // Si está fuera de rango o ya pasó, vuelve al Día 1
            return 1;
        }

        window.onload = () => { 
            renderTabs(); 
            const defaultDay = getAutoDay();
            setTimeout(() => {
                renderChart(); 
                setLang('en');
                selectDay(defaultDay);
            }, 150);
        };
    </script>
