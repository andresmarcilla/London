                  analysis: {

            { id: 2, date: "Apr 19", title_en: "Brutalism as Urban Strata", title_es: "Brutalismo como Estratos Urbanos", steps: 18000,

                    driver_en: "Post-war social democracy and the need for secular temples. The government wanted a theatre that rejected the elitism of gilded boxes, focusing instead on visible structural honesty and public accessibility. It was a programmatic drive to create a 'home for the arts' that felt intellectually transparent and physically rugged.",

                    driver_es: "La ambición de 1393 de Ricardo II de crear el techo de luz libre más grande de Europa. El motor fue alejarse de las columnas centrales, permitiendo el dominio visual total de la sala durante banquetes y juicios, demostrando que la ley del Rey era tan expansiva como el techo.",

                    aesthetics_es: "Maestría del Gótico Perpendicular. El techo de Hammerbeam de roble (1393) utiliza un sistema complejo de cerchas talladas con ángeles para crear una sensación de ingravidez celestial, convirtiendo un recinto de piedra en un bosque estructural."

            { id: 3, date: "Apr 20", title_en: "Inside-Out: High-Tech Machine", title_es: "Inside-Out: Máquina High-Tech", steps: 19000,

                  analysis: { 
                    cosmovision_en: "Architecture as a mechanical organism. Richard Rogers rejected the static 'Box' in favor of 'Bowellism'—celebrating the building's internal systems as external ornament. The building is a living machine that metabolizes financial data, where the architecture is defined by the flux of services rather than static walls. It represents a hyper-functionalist future where transparency and flexibility are the primary legal and structural currencies.", 
                    cosmovision_es: "Arquitectura como organismo mecánico. Richard Rogers rechazó la 'Caja' estática en favor del 'Bowellism', celebrando los sistemas internos como ornamento externo. El edificio es una máquina viva que metaboliza datos financieros, donde la arquitectura se define por el flujo de servicios. Representa un futuro hiper-funcionalista donde la transparencia y la flexibilidad son las divisas principales.",

                    aesthetics_en: "Gleaming stainless steel, blue glass, and external modular service pods. The aesthetic is hyper-industrial and restless, emphasized by the exposed cranes on top that signal a building that is never truly finished, always ready for the next technological upgrade. It is a visual manifesto of 'high-tech' honesty.", 
                    aesthetics_es: "Acero inoxidable reluciente, vidrio azul y módulos de servicio externos. La estética es hiper-industrial e inquieta, enfatizada por las grúas expuestas arriba que señalan un edificio que nunca está terminado, siempre listo para la próxima actualización tecnológica. Es un manifiesto visual de honestidad técnica."

                    cosmovision_en: "Sky-democracy. This project reclaims the horizon as a public common path, challenging the notion that high-level views belong only to corporations. It is a pocket of soft landscape floating within the hard steel grid of the financial center, offering the citizen a sensory escape and a new topological ground level for urban contemplation.",

                b.innerText = d.date;
                b.onclick = () => selectDay(d.id);
                container.appendChild(b);

                    datasets: [{ data: masterItinerary.map(d => d.steps), backgroundColor: '#e4e4e7', hoverBackgroundColor: '#e11d48', borderRadius: 4 }]

                            <span class="text-[9px] font-bold text-zinc-300 uppercase flex-shrink-0">Seq 0${index + 1}</span>
                        </div>
                        <h4 class="font-black text-zinc-800 text-xl leading-tight mb-2">${node['act_'+currentLang]}</h4>
                        ${noteVal ? `<p class="text-sm text-zinc-500 mb-6 leading-relaxed italic">${noteVal}</p>` : ''}
                        <section class="arch-card mb-6">
                            <div class="grid grid-cols-1 gap-8 text-justify long-desc">
                                <div>
                                    <span class="section-label">${t.cosmovision}</span>
                                    <p>${node.analysis['cosmovision_'+currentLang]}</p>
                                </div>
                                <div class="border-t border-zinc-100 pt-6">
                                    <span class="section-label">${t.drivers}</span>
                                    <p>${node.analysis['driver_'+currentLang]}</p>
                                </div>
                                <div class="border-t border-zinc-100 pt-6">
                                    <span class="section-label">${t.aesthetics}</span>
                                    <p class="font-medium text-zinc-900 bg-zinc-50 rounded-xl p-4 border border-zinc-100">${node.analysis['aesthetics_'+currentLang]}</p>
                                </div>
                            </div>
                        </section>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(node.loc)}" target="_blank" class="map-btn border border-zinc-200">📍 GPS Walk Navigation</a>
                    </div>
                `;
            }).join('');

            const banksyText = data['banksy_'+currentLang] ?? "N/A";
            const banksyLoc = data.banksy_loc ?? "N/A";

            content.innerHTML = `
                <div class="mb-10">
                    <h3 class="text-3xl font-black text-zinc-900 leading-none tracking-tighter mb-3">${data['title_'+currentLang]}</h3>
                    <p class="text-[10px] font-black text-zinc-400 uppercase tracking-[0.25em]">${data.date} • ${t.fieldOps}</p>
                </div>
                <div class="space-y-12">
                    ${scheduleHtml}
                </div>
                <div class="banksy-box shadow-lg">
                    <div class="flex items-center gap-3 mb-5">
                        <div class="w-2 h-8 bg-rose-600"></div>
                        <span class="text-[11px] font-black uppercase tracking-[0.3em] text-rose-500">${t.hito}</span>
                    </div>
                    <p class="text-[15px] font-medium italic text-zinc-300 leading-relaxed mb-4">"${banksyText}"</p>
                    <div class="pt-4 border-t border-white/10">
                        <span class="section-label text-zinc-500">${t.location}</span>
                        <p class="text-[12px] font-mono text-white mb-4">${banksyLoc}</p>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(banksyLoc)}" target="_blank" class="map-btn bg-white !text-zinc-900 shadow-none">📍 Navigate to Piece</a>
                    </div>
                </div>
            `;
            
            if (typeof Chart !== 'undefined' && loadChart) {
                loadChart.data.datasets[0].backgroundColor = masterItinerary.map(d => d.id === id ? '#e11d48' : '#e4e4e7');
                loadChart.update();
            }
        }

        window.onload = () => { 
            renderTabs(); 
            setTimeout(() => {
                renderChart(); 
                setLang('en');
            }, 100);
        };
    </script>
</body>
</html>
