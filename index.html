<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>London Arch-Manual | April 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #fafafa; color: #18181b; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-tab { border-bottom: 4px solid #e11d48; color: #e11d48; font-weight: 800; }
        .chart-container { position: relative; height: 160px; width: 100%; }
        .map-btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; background: #18181b; color: white;
            padding: 14px; border-radius: 12px; font-size: 0.85rem;
            font-weight: 700; margin-top: 8px; transition: all 0.2s;
        }
        .map-btn:active { transform: scale(0.96); background: #e11d48; }
        .timeline-item { position: relative; padding-left: 28px; border-left: 2px solid #e4e4e7; padding-bottom: 32px; }
        .timeline-item::before {
            content: ''; position: absolute; left: -7px; top: 0;
            width: 12px; height: 12px; background: white;
            border: 2px solid #18181b; border-radius: 50%;
        }
        .arch-card { background: white; border-radius: 16px; padding: 20px; border: 1px solid #e4e4e7; margin-bottom: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .banksy-box { background: #18181b; color: #f4f4f5; border-radius: 16px; padding: 20px; border-left: 6px solid #e11d48; margin-top: 20px; }
        .section-label { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #71717a; margin-bottom: 4px; display: block; }
    </style>
</head>
<body class="antialiased">

    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-zinc-200">
        <div class="px-5 py-4 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase italic leading-none">London <span class="text-rose-600">Arch-Manual</span></h1>
                <p class="text-[10px] font-bold text-zinc-400 tracking-widest uppercase mt-1">Base: Smart Hyde Park Inn</p>
            </div>
            <div class="text-right">
                <span id="step-badge" class="text-[10px] bg-zinc-900 px-2 py-1 rounded text-white font-black tracking-tighter italic">-- STEPS</span>
            </div>
        </div>
        
        <nav class="flex overflow-x-auto no-scrollbar border-t border-zinc-100 bg-zinc-50/50">
            <div id="tab-container" class="flex whitespace-nowrap px-2"></div>
        </nav>
    </header>

    <main class="px-5 py-8 space-y-8 pb-32">
        <div id="day-content"></div>

        <section class="bg-white p-6 rounded-2xl border border-zinc-200 shadow-sm">
            <h2 class="text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-4">Physical Metabolism Analysis</h2>
            <div class="chart-container">
                <canvas id="loadChart"></canvas>
            </div>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-zinc-200 p-4 px-6 flex justify-between items-center shadow-2xl">
        <div class="flex flex-col">
            <span class="text-[9px] font-black text-zinc-400 uppercase">Operational Zone</span>
            <span id="footer-day" class="text-sm font-black text-zinc-900 tracking-tight">Loading...</span>
        </div>
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="w-10 h-10 bg-zinc-100 rounded-xl flex items-center justify-center font-bold text-zinc-400">↑</button>
    </div>

    <script>
        const masterItinerary = [
            { id: 1, date: "Apr 18", title: "Adaptive Reuse: Bayswater", steps: 5000, 
              analysis: {
                target: "Whiteleys London",
                cosmovision: "The 'Second Life' of heritage. It represents the transformation of 20th-century department stores into 21st-century vertical luxury communities.",
                driver: "The collapse of traditional retail and the need for high-density, mixed-use luxury housing in central London.",
                aesthetics: "Foster + Partners' signature: Preserving the 1911 Grade II facade while inserting a modern, light-filled internal structure with high-end glass and timber finishes."
              },
              schedule: [
                { time: "19:00", act: "Check-in: Smart Hyde Park Inn", loc: "Smart Hyde Park Inn London", note: "Setup base." },
                { time: "19:45", act: "Survey: Whiteleys", loc: "Whiteleys London", note: "Adaptive reuse study." }
              ], banksy: "The Painter (Notting Hill) - Stencil of a painter writing 'Banksy' on the wall." },
            
            { id: 2, date: "Apr 19", title: "Brutalist Urbanism", steps: 18000, 
              analysis: {
                target: "National Theatre",
                cosmovision: "Architecture as 'Urban Strata'. Denys Lasdun conceived the building as a man-made geological formation that extends the city sidewalks into terraces.",
                driver: "Post-war cultural reconstruction. The need for a secular temple for the arts that rejected bourgeois ornamentation.",
                aesthetics: "Brutalist. Board-marked concrete (showing wood grain), sharp interlocking volumes, and the rejection of a singular front facade."
              },
              schedule: [
                { time: "11:00", act: "Hito: National Theatre", loc: "National Theatre London", note: "Concrete layering study." },
                { time: "14:30", act: "Analysis: Westminster Hall", loc: "Westminster Hall", note: "Perpendicular Gothic study." }
              ], banksy: "Leake Street Tunnel - Banksy's 'Cans Festival' site. A dynamic layer of city ink." },

            { id: 3, date: "Apr 20", title: "High-Tech Corporate", steps: 19000, 
              analysis: {
                target: "Lloyd's Building",
                cosmovision: "Bowellism / Inside-Out. The building is a machine that prioritizes serviceability; the internal space is a cathedral of light completely free of obstructions.",
                driver: "The 1980s Big Bang in finance. Lloyd's needed a flexible space that could be easily maintained without disrupting global insurance trade.",
                aesthetics: "High-Tech. Stainless steel ducts, glass elevators, and external staircases creating a hyper-industrial, restless exterior silhouette."
              },
              schedule: [
                { time: "10:00", act: "Hito: Lloyd's of London", loc: "Lloyd's of London", note: "Rogers' masterclass." },
                { time: "13:00", act: "Survey: Garden at 120", loc: "The Garden at 120", note: "Rooftop section analysis." }
              ], banksy: "Basquiat Murals - Satire under the Barbican tunnel. Protected by glass." },

            { id: 4, date: "Apr 21", title: "Indo-Saracenic Escapism", steps: 20000, 
              analysis: {
                target: "Royal Pavilion Brighton",
                cosmovision: "Orientalist Fantasy. An architectural 'mask' that allowed the British elite to play with the aesthetic of an empire they were still colonizing.",
                driver: "The Prince Regent's desire for a pleasure palace away from the rigid formalities of London court life.",
                aesthetics: "Indo-Saracenic. Cast-iron frames supporting onion domes, minarets, and a Chinese-inspired interior 'Chinoiserie' that defies logic."
              },
              schedule: [
                { time: "11:00", act: "Hito: Royal Pavilion", loc: "Royal Pavilion Brighton", note: "Nash's engineering." },
                { time: "15:00", act: "Analysis: i360 Tower", loc: "British Airways i360", note: "Vertical urbanism." }
              ], banksy: "Kissing Policemen Site - Replica on Frederick St." },

            { id: 5, date: "Apr 22", title: "Palladian Order", steps: 16000, 
              analysis: {
                target: "The Royal Crescent",
                cosmovision: "The Enlightenment in Stone. Urbanism that seeks to tame the landscape through rigid symmetry and the application of classical Roman orders to housing.",
                driver: "The rise of Bath as a healing spa destination for the aristocracy, requiring housing that mirrored their social status.",
                aesthetics: "Palladian. Oolitic limestone (Bath Stone), Ionical columns, and a repetitive rhythm that creates a sense of infinite monumentality."
              },
              schedule: [
                { time: "14:30", act: "Roman Baths (BOOKED)", loc: "Roman Baths Bath", note: "Ancient hydraulics." },
                { time: "17:00", act: "Hito: Royal Crescent", loc: "The Royal Crescent Bath", note: "Urban planning study." }
              ], banksy: "Zero graffiti in UNESCO zone. Analyze limestone aging." },

            { id: 6, date: "Apr 23", title: "Industrial Synthesis", steps: 17000, 
              analysis: {
                target: "Coal Drops Yard",
                cosmovision: "The 'Kissing' point. Heatherwick's approach was to bridge two distinct Victorian structures with a third, fluid modern element to create a heart for King's Cross.",
                driver: "The massive King's Cross regeneration project aiming to turn derelict rail lands into a tech and education hub (Google/CSM).",
                aesthetics: "Industrial/Modern. Slate roofs curved into fluid shapes, black steel columns, and granite paving that echoes the site's rail history."
              },
              schedule: [
                { time: "10:00", act: "Survey: King's X Canopy", loc: "King's Cross Station", note: "McAslan's steel canopy." },
                { time: "14:00", act: "Hito: Coal Drops Yard", loc: "Coal Drops Yard", note: "Heatherwick's kiss." }
              ], banksy: "Historic graffiti nodes under railway overpasses." },

            { id: 7, date: "Apr 24", title: "Baroque Maritime Power", steps: 19000, 
              analysis: {
                target: "Old Royal Naval College",
                cosmovision: "Symmetry as Authority. Wren used the site to create a grand vista that framed the Queen's House, asserting the Navy's central role in British identity.",
                driver: "Originally a hospital for seamen, built on the site of a royal palace to showcase Britain's naval and scientific dominance.",
                aesthetics: "English Baroque. Portland stone, monumental domes, and a strict adherence to the classical laws of perspective."
              },
              schedule: [
                { time: "10:00", act: "Hito: Old Naval College", loc: "Old Royal Naval College", note: "Wren's symmetry." },
                { time: "13:30", act: "Engineering: Foot Tunnel", loc: "Greenwich Foot Tunnel", note: "Victorian ironwork." }
              ], banksy: "Docklands - Search stencils on industrial pillars." },

            { id: 8, date: "Apr 25", title: "Institutional Light", steps: 20000, 
              analysis: {
                target: "Great Court (British Museum)",
                cosmovision: "The 'Lost Space' recovered. Turning a redundant outdoor courtyard into the largest covered public square in Europe through technology.",
                driver: "The British Museum's need to handle millions of visitors and provide a central hub that connects disconnected galleries.",
                aesthetics: "Modern/Classical. Foster's glass and steel tessellated roof (each pane unique), wrapping around the neoclassical Reading Room."
              },
              schedule: [
                { time: "10:00", act: "Soane Museum (BOOKED)", loc: "Sir John Soane's Museum", note: "Zenithal light study." },
                { time: "12:30", act: "British Museum (BOOKED)", loc: "British Museum", note: "Foster's roof nodes." }
              ], banksy: "Guard Dog & Yellow Flower in Shoreditch." },

            { id: 9, date: "Apr 26", title: "Energy Regeneration", steps: 15000, 
              analysis: {
                target: "Battersea Power Station",
                cosmovision: "Electric Cathedral. A monument to coal power transformed into a monument to consumerism and tech, preserving the volume of the original 'Void'.",
                driver: "Decades of dereliction following the plant's closure. The redevelopment is a symbol of London's post-industrial shift.",
                aesthetics: "Industrial Art Deco. 1.75 million bricks, four iconic white chimneys, and an interior Turbine Hall that preserves industrial scale."
              },
              schedule: [
                { time: "10:00", act: "Battersea Power Station", loc: "Battersea Power Station", note: "Brick survey." },
                { time: "17:00", act: "Sky Garden (BOOKED)", loc: "Sky Garden London", note: "Golden Hour study." }
              ], banksy: "The shadows of the Sky Garden structure at 17:00 are unmatched." },

            { id: 10, date: "Apr 27", title: "Industrial Bankside", steps: 12000, 
              analysis: {
                target: "Tate Modern (Switch House)",
                cosmovision: "The 'New Mountain'. A vertical gallery that breaks the traditional museum horizontal flow, acting as a beacon for the South Bank.",
                driver: "The overwhelming success of the original Tate Modern (Bankside Power Station) required a massive expansion for live art and education.",
                aesthetics: "Contemporary Brickwork. Perforated brick lattice that allows light to filter out at night, folded into a pyramid-like geometry."
              },
              schedule: [
                { time: "10:00", act: "Hito: Tate Modern", loc: "Tate Modern", note: "H&dM brickwork study." },
                { time: "13:30", act: "Survey: Borough Market", loc: "Borough Market", note: "Shard looming above." }
              ], banksy: "Southwark Bridge river stencils." }
        ];

        let loadChart;

        function init() {
            renderTabs();
            renderChart();
            selectDay(1);
        }

        function renderTabs() {
            const container = document.getElementById('tab-container');
            masterItinerary.forEach(d => {
                const b = document.createElement('button');
                b.id = `tab-${d.id}`;
                b.className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all opacity-40";
                b.innerText = d.date;
                b.onclick = () => selectDay(d.id);
                container.appendChild(b);
            });
        }

        function renderChart() {
            const ctx = document.getElementById('loadChart').getContext('2d');
            loadChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: masterItinerary.map(d => d.date),
                    datasets: [{
                        data: masterItinerary.map(d => d.steps),
                        backgroundColor: '#e4e4e7',
                        hoverBackgroundColor: '#e11d48',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false, beginAtZero: true } }
                }
            });
        }

        function selectDay(id) {
            const data = masterItinerary.find(d => d.id === id);
            
            masterItinerary.forEach(d => document.getElementById(`tab-${d.id}`).className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all opacity-40");
            const active = document.getElementById(`tab-${id}`);
            active.className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all active-tab";
            active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

            document.getElementById('step-badge').innerText = `${data.steps.toLocaleString()} STEPS`;
            document.getElementById('footer-day').innerText = `${data.date}: ${data.title}`;

            const content = document.getElementById('day-content');
            content.innerHTML = `
                <div class="mb-8">
                    <h3 class="text-4xl font-black text-zinc-900 leading-none tracking-tighter mb-2">${data.title}</h3>
                    <p class="text-[10px] font-black text-zinc-400 uppercase tracking-[0.2em]">${data.date} • ARCHITECTURAL ANALYSIS</p>
                </div>

                <section class="arch-card">
                    <div class="mb-4">
                        <span class="section-label">Highlight Site</span>
                        <h4 class="text-xl font-black text-zinc-800">${data.analysis.target}</h4>
                    </div>
                    <div class="grid gap-4">
                        <div>
                            <span class="section-label">Cosmovision</span>
                            <p class="text-xs text-zinc-600 leading-relaxed">${data.analysis.cosmovision}</p>
                        </div>
                        <div>
                            <span class="section-label">Driving Factor</span>
                            <p class="text-xs text-zinc-600 leading-relaxed">${data.analysis.driver}</p>
                        </div>
                        <div>
                            <span class="section-label">Aesthetic Language</span>
                            <p class="text-xs text-zinc-600 leading-relaxed">${data.analysis.aesthetics}</p>
                        </div>
                    </div>
                </section>

                <div class="space-y-4">
                    ${data.schedule.map((node, index) => `
                        <div class="timeline-item">
                            <div class="flex justify-between items-baseline mb-2">
                                <span class="text-[9px] font-black text-rose-600 bg-rose-50 px-2 py-0.5 rounded uppercase tracking-widest">${node.time}</span>
                                <span class="text-[8px] font-bold text-zinc-300 uppercase">Sequence 0${index + 1}</span>
                            </div>
                            <h4 class="font-black text-zinc-800 text-lg leading-tight mb-1">${node.act}</h4>
                            <p class="text-xs text-zinc-500 mb-4 leading-relaxed">${node.note}</p>
                            <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(node.loc)}" 
                               target="_blank" class="map-btn">
                               📍 GPS Walk Navigation
                            </a>
                        </div>
                    `).join('')}
                </div>

                <div class="banksy-box shadow-xl">
                    <div class="flex items-center gap-2 mb-4">
                        <div class="w-1.5 h-6 bg-rose-600"></div>
                        <span class="text-[10px] font-black uppercase tracking-[0.2em] text-rose-500">Street Art Hito</span>
                    </div>
                    <p class="text-sm font-medium italic text-zinc-300 leading-relaxed">"${data.banksy}"</p>
                </div>
            `;

            loadChart.data.datasets[0].backgroundColor = masterItinerary.map(d => d.id === id ? '#e11d48' : '#e4e4e7');
            loadChart.update();
        }

        window.onload = init;
    </script>
</body>
</html>
