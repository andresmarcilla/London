        function setLang(lang) {
            currentLang = lang;

            document.getElementById('metabolism-label').innerText = translations[lang].metabolism;
            document.getElementById('op-zone-label').innerText = translations[lang].opZone;
            selectDay(currentDayId);
        }

        function renderTabs() {
            const container = document.getElementById('tab-container');
            container.innerHTML = '';
            masterItinerary.forEach(d => {
                const b = document.createElement('button');
                b.id = `tab-${d.id}`;
                b.className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all opacity-40";
                b.innerText = d.date;
                b.onclick = () => selectDay(d.id);
                container.appendChild(b);
            });
        }

        function renderChart() {
            const ctx = document.getElementById('loadChart').getContext('2d');
            loadChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: masterItinerary.map(d => d.date),
                    datasets: [{ data: masterItinerary.map(d => d.steps), backgroundColor: '#e4e4e7', hoverBackgroundColor: '#e11d48', borderRadius: 4 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false, beginAtZero: true } } }
            });
        }
