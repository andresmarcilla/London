<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manual de Arquitectura Londres | Abril 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #fafafa; color: #18181b; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-tab { border-bottom: 4px solid #e11d48; color: #e11d48; font-weight: 800; }
        .chart-container { position: relative; height: 160px; width: 100%; }
        .map-btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; background: #18181b; color: white;
            padding: 14px; border-radius: 12px; font-size: 0.85rem;
            font-weight: 700; margin-top: 8px; transition: all 0.2s;
        }
        .map-btn:active { transform: scale(0.96); background: #e11d48; }
        
        .timeline-item { position: relative; padding-left: 28px; border-left: 2px solid #e4e4e7; padding-bottom: 32px; }
        .timeline-item::before {
            content: ''; position: absolute; left: -7px; top: 0;
            width: 12px; height: 12px; background: white;
            border: 2px solid #18181b; border-radius: 50%;
        }
        .banksy-box { background: #18181b; color: #f4f4f5; border-radius: 16px; padding: 20px; border-left: 6px solid #e11d48; margin-top: 20px; }
    </style>
</head>
<body class="antialiased">

    <!-- Header Fijo -->
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-zinc-200">
        <div class="px-5 py-4 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase italic leading-none">London <span class="text-rose-600">Arch-Manual</span></h1>
                <p class="text-[10px] font-bold text-zinc-400 tracking-widest uppercase mt-1">Base: Smart Hyde Park Inn</p>
            </div>
            <div class="text-right">
                <span id="step-badge" class="text-[10px] bg-zinc-900 px-2 py-1 rounded text-white font-black tracking-tighter italic">-- PASOS</span>
            </div>
        </div>
        
        <nav class="flex overflow-x-auto no-scrollbar border-t border-zinc-100 bg-zinc-50/50">
            <div id="tab-container" class="flex whitespace-nowrap px-2">
            </div>
        </nav>
    </header>

    <main class="px-5 py-8 space-y-10 pb-32">
        
        <!-- Contenedor Dinámico -->
        <div id="day-content" class="min-h-[400px]">
        </div>

        <!-- Gráfico de Carga Física -->
        <section class="bg-white p-6 rounded-2xl border border-zinc-200 shadow-sm">
            <h2 class="text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-4">Análisis de Carga Metabólica</h2>
            <div class="chart-container">
                <canvas id="loadChart"></canvas>
            </div>
            <p class="text-[9px] text-zinc-400 mt-4 text-center italic">Calculado a un ritmo urbano de 4.5 km/h</p>
        </section>

    </main>

    <!-- Barra de Estado Inferior -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-zinc-200 p-4 px-6 flex justify-between items-center shadow-2xl">
        <div class="flex flex-col">
            <span class="text-[9px] font-black text-zinc-400 uppercase">Objetivo Activo</span>
            <span id="footer-day" class="text-sm font-black text-zinc-900 tracking-tight">Selecciona un día</span>
        </div>
        <div class="flex gap-2">
            <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="w-10 h-10 bg-zinc-100 rounded-xl flex items-center justify-center font-bold text-zinc-400">↑</button>
        </div>
    </div>

    <script>
        const masterItinerary = [
            { id: 1, date: "Apr 18", title: "Llegada y Base", steps: 5000, schedule: [
                { time: "19:00", act: "Check-in: Smart Hyde Park Inn", loc: "Smart Hyde Park Inn London", note: "Establecer base en Bayswater. Equipaje a taquilla." },
                { time: "19:45", act: "Estudio: Whiteleys", loc: "Whiteleys London", note: "Estudio de la conversión insignia de Foster + Partners." },
                { time: "20:30", act: "Banksy: El Pintor", loc: "Acklam Road Banksy", note: "Buscar el estarcido bajo el puente de Westway." }
            ], banksy: "El Pintor (Notting Hill) - Estarcido de un pintor escribiendo 'Banksy' en la pared." },
            
            { id: 2, date: "Apr 19", title: "Estratos Brutalistas", steps: 18000, schedule: [
                { time: "09:00", act: "Salida: Caminata al South Bank", loc: "National Theatre London", note: "Caminar por Hyde Park/Green Park (75 min)." },
                { time: "11:00", act: "Hito: National Theatre", loc: "National Theatre London", note: "Capas de hormigón de Lasdun. Observar texturas de encofrado de madera." },
                { time: "14:30", act: "Análisis: Westminster Hall", loc: "Westminster Hall", note: "Estudio de techumbre de madera de estilo gótico perpendicular." },
                { time: "16:30", act: "Arte Urbano: Leake St", loc: "Leake Street Arches", note: "Santuario legal del graffiti bajo las vías del tren." }
            ], banksy: "Leake Street Tunnel - Sitio del 'Cans Festival' de Banksy. Una capa dinámica de tinta urbana." },

            { id: 3, date: "Apr 20", title: "La Milla de Alta Tecnología", steps: 19000, schedule: [
                { time: "10:00", act: "Hito: Lloyd's de Londres", loc: "Lloyd's of London", note: "Clase maestra de Bowellism de Richard Rogers." },
                { time: "13:00", act: "Estudio: Garden at 120", loc: "The Garden at 120", note: "Análisis de sección de azotea. No requiere reserva." },
                { time: "15:30", act: "Banksy: Murales Basquiat", loc: "Beech Street Banksy", note: "Dos murales protegidos bajo el túnel del Barbican." }
            ], banksy: "Murales Basquiat - Crítica a la mercantilización del arte. Protegidos por cristal de alta calidad." },

            { id: 4, date: "Apr 21", title: "Brighton Costero", steps: 20000, schedule: [
                { time: "08:15", act: "Salida: Caminata a Victoria", loc: "Victoria Station London", note: "Caminata matutina vigorosa de 45 min a la estación." },
                { time: "11:00", act: "Hito: Royal Pavilion", loc: "Royal Pavilion Brighton", note: "Ingeniería de hierro indo-sarracena de Nash." },
                { time: "15:00", act: "Análisis: i360 Tower", loc: "British Airways i360", note: "Explanada urbana vertical de Marks Barfield." }
            ], banksy: "Sitio de los Policías Besándose - Réplica en el lateral del Prince Albert Pub (Frederick St)." },

            { id: 5, date: "Apr 22", title: "Geometría Palladiana", steps: 16000, schedule: [
                { time: "10:30", act: "Llegada: Paddington Station", loc: "Paddington Station", note: "Caminata de 15 min desde el hostal para tomar el tren GWR." },
                { time: "14:30", act: "Termas Romanas (RESERVADO)", loc: "Roman Baths Bath", note: "Hora de entrada estricta. Análisis de hidráulica antigua." },
                { time: "17:00", act: "Hito: The Royal Crescent", loc: "The Royal Crescent Bath", note: "Estudio de planificación urbana de The Circus & Crescent." }
            ], banksy: "Texturas de Piedra - Cero graffiti en zona UNESCO. Analizar el envejecimiento de la piedra caliza." },

            { id: 6, date: "Apr 23", title: "King's X Industrial", steps: 17000, schedule: [
                { time: "10:00", act: "Estudio: Marquesina King's X", loc: "King's Cross Station", note: "Estudio de integración de celosía de acero de McAslan." },
                { time: "14:00", act: "Hito: Coal Drops Yard", loc: "Coal Drops Yard", note: "Nodos de 'beso' de la techumbre de pizarra de Heatherwick." },
                { time: "16:30", act: "Caminata: Regent's Canal", loc: "Camden Market", note: "Caminata arqueológica industrial por el camino de sirga." }
            ], banksy: "Camden Canal - Nodos históricos de graffiti. Buscar bajo los pasos elevados del tren." },

            { id: 7, date: "Apr 24", title: "Greenwich Marítimo", steps: 19000, schedule: [
                { time: "10:00", act: "Hito: Old Naval College", loc: "Old Royal Naval College", note: "Simetría barroca de Christopher Wren." },
                { time: "13:30", act: "Ingeniería: Foot Tunnel", loc: "Greenwich Foot Tunnel", note: "Ingeniería de túnel bajo el río de hierro fundido de 1902." },
                { time: "15:30", act: "Estudio: Canary Wharf", loc: "Canary Wharf", note: "Estudio de verticalidad corporativa de Pelli/Foster." }
            ], banksy: "Docklands - Buscar restos de estarcidos en pilares industriales." },

            { id: 8, date: "Apr 25", title: "Protocolo de Museos", steps: 20000, schedule: [
                { time: "08:45", act: "Salida: Caminata a Holborn", loc: "Sir John Soane's Museum", note: "Caminata de 65 min cruzando el centro de Londres." },
                { time: "10:00", act: "Soane Museum (RESERVADO)", loc: "Sir John Soane's Museum", note: "Análisis de sección compleja y luz." },
                { time: "12:30", act: "British Museum (RESERVADO)", loc: "British Museum", note: "Análisis de los nodos del techo del Great Court de Foster." },
                { time: "16:00", act: "Banksy: Bucle Shoreditch", loc: "Rivington Street Banksy", note: "Piezas Guard Dog y Yellow Flower." }
            ], banksy: "Guard Dog & Yellow Flower - Elementos básicos del arte urbano en Shoreditch." },

            { id: 9, date: "Apr 26", title: "Maratón y Sky Garden", steps: 15000, schedule: [
                { time: "10:00", act: "Battersea Power Station", loc: "Battersea Power Station", note: "Mantenerse al Oeste para evitar multitudes de la Maratón. Estudio de ladrillo." },
                { time: "15:30", act: "Río: Tránsito Uber Boat", loc: "Tower Pier London", note: "Evitar el Metro. Tomar barco hasta Tower Pier." },
                { time: "17:00", act: "Sky Garden (RESERVADO)", loc: "Sky Garden London", note: "Estudio de ingeniería al atardecer en la hora dorada." }
            ], banksy: "Sky Garden - Las sombras de la estructura a las 17:00 no tienen rival." },

            { id: 10, date: "Apr 27", title: "Despedida en Bankside", steps: 12000, schedule: [
                { time: "10:00", act: "Hito: Tate Modern", loc: "Tate Modern", note: "Extensión de ladrillo de Herzog & de Meuron." },
                { time: "13:30", act: "Estudio: Borough Market", loc: "Borough Market", note: "The Shard de Renzo Piano asomando por encima." },
                { time: "15:30", act: "Final: Paddington", loc: "Paddington Station", note: "Traslado en Elizabeth Line al Aeropuerto." }
            ], banksy: "Southwark Bridge - Buscar bajo los puentes estarcidos con temas del río." }
        ];

        let loadChart;

        function init() {
            renderTabs();
            renderChart();
            selectDay(1);
        }

        function renderTabs() {
            const container = document.getElementById('tab-container');
            masterItinerary.forEach(d => {
                const b = document.createElement('button');
                b.id = `tab-${d.id}`;
                b.className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all opacity-40";
                b.innerText = d.date;
                b.onclick = () => selectDay(d.id);
                container.appendChild(b);
            });
        }

        function renderChart() {
            const ctx = document.getElementById('loadChart').getContext('2d');
            loadChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: masterItinerary.map(d => d.date),
                    datasets: [{
                        data: masterItinerary.map(d => d.steps),
                        backgroundColor: '#e4e4e7',
                        hoverBackgroundColor: '#e11d48',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { display: false }, 
                        y: { display: false, beginAtZero: true } 
                    }
                }
            });
        }

        function selectDay(id) {
            const data = masterItinerary.find(d => d.id === id);
            
            // Estado de UI
            masterItinerary.forEach(d => document.getElementById(`tab-${d.id}`).className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all opacity-40");
            const active = document.getElementById(`tab-${id}`);
            active.className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all active-tab";
            active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

            // Badge y Footer
            document.getElementById('step-badge').innerText = `${data.steps.toLocaleString()} PASOS`;
            document.getElementById('footer-day').innerText = `${data.date}: ${data.title}`;

            // Renderizado de Contenido
            const content = document.getElementById('day-content');
            content.innerHTML = `
                <div class="mb-10">
                    <h3 class="text-4xl font-black text-zinc-900 leading-none tracking-tighter mb-2">${data.title}</h3>
                    <p class="text-[10px] font-black text-zinc-400 uppercase tracking-[0.2em]">${data.date} • PROTOCOLO ARQUITECTÓNICO</p>
                </div>

                <div class="space-y-2">
                    ${data.schedule.map((node, index) => `
                        <div class="timeline-item">
                            <div class="flex justify-between items-baseline mb-2">
                                <span class="text-[9px] font-black text-rose-600 bg-rose-50 px-2 py-0.5 rounded uppercase tracking-widest">${node.time}</span>
                                <span class="text-[8px] font-bold text-zinc-300 uppercase">Secuencia 0${index + 1}</span>
                            </div>
                            <h4 class="font-black text-zinc-800 text-lg leading-tight mb-1">${node.act}</h4>
                            <p class="text-xs text-zinc-500 mb-4 leading-relaxed">${node.note}</p>
                            <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(node.loc)}" 
                               target="_blank" class="map-btn">
                               📍 Navegación GPS (Caminando)
                            </a>
                        </div>
                    `).join('')}
                </div>

                <div class="banksy-box shadow-xl">
                    <div class="flex items-center gap-2 mb-4">
                        <div class="w-1.5 h-6 bg-rose-600"></div>
                        <span class="text-[10px] font-black uppercase tracking-[0.2em] text-rose-500">Hito de Arte Urbano</span>
                    </div>
                    <p class="text-sm font-medium italic text-zinc-300 leading-relaxed">"${data.banksy}"</p>
                </div>
            `;

            // Actualización de color en el gráfico
            loadChart.data.datasets[0].backgroundColor = masterItinerary.map(d => d.id === id ? '#e11d48' : '#e4e4e7');
            loadChart.update();
        }

        window.onload = init;
    </script>
</body>
</html>
