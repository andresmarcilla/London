<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>London Arch-Manual | April 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #fafafa; color: #18181b; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-tab { border-bottom: 4px solid #e11d48; color: #e11d48; font-weight: 800; }
        .chart-container { position: relative; height: 160px; width: 100%; }
        .map-btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; background: #18181b; color: white;
            padding: 14px; border-radius: 12px; font-size: 0.85rem;
            font-weight: 700; margin-top: 8px; transition: all 0.2s;
        }
        .map-btn:active { transform: scale(0.96); background: #e11d48; }
        .audio-btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; background: #4f46e5; color: white;
            padding: 10px; border-radius: 12px; font-size: 0.75rem;
            font-weight: 700; margin-top: 8px; transition: all 0.2s; gap: 8px;
        }
        .audio-btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .timeline-item { position: relative; padding-left: 28px; border-left: 2px solid #e4e4e7; padding-bottom: 32px; }
        .timeline-item::before {
            content: ''; position: absolute; left: -7px; top: 0;
            width: 12px; height: 12px; background: white;
            border: 2px solid #18181b; border-radius: 50%;
        }
        .arch-card { background: white; border-radius: 16px; padding: 16px; border: 1px solid #e4e4e7; margin-top: 12px; }
        .banksy-box { background: #18181b; color: #f4f4f5; border-radius: 16px; padding: 20px; border-left: 6px solid #e11d48; margin-top: 20px; }
        .section-label { font-size: 0.6rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #a1a1aa; margin-bottom: 2px; display: block; }
        .departure-tag { font-size: 0.7rem; font-weight: 800; color: #e11d48; background: #fff1f2; padding: 2px 8px; border-radius: 99px; }
        
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #ffffff; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased">

    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-zinc-200">
        <div class="px-5 py-4 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase italic leading-none">London <span class="text-rose-600">Arch-Manual</span></h1>
                <div class="flex items-center gap-3 mt-2">
                    <button onclick="setLang('en')" id="btn-en" class="text-[10px] font-bold px-2 py-1 rounded bg-zinc-900 text-white">EN</button>
                    <button onclick="setLang('es')" id="btn-es" class="text-[10px] font-bold px-2 py-1 rounded bg-zinc-100 text-zinc-400">ES</button>
                </div>
            </div>
            <div class="text-right">
                <span id="step-badge" class="text-[10px] bg-zinc-900 px-2 py-1 rounded text-white font-black tracking-tighter italic">-- STEPS</span>
            </div>
        </div>
        
        <nav class="flex overflow-x-auto no-scrollbar border-t border-zinc-100 bg-zinc-50/50">
            <div id="tab-container" class="flex whitespace-nowrap px-2"></div>
        </nav>
    </header>

    <main class="px-5 py-8 space-y-8 pb-32">
        <div id="day-content"></div>

        <section class="bg-white p-6 rounded-2xl border border-zinc-200 shadow-sm">
            <h2 id="metabolism-label" class="text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-4">Physical Metabolism Analysis</h2>
            <div class="chart-container">
                <canvas id="loadChart"></canvas>
            </div>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-zinc-200 p-4 px-6 flex justify-between items-center shadow-2xl">
        <div class="flex flex-col">
            <span id="op-zone-label" class="text-[9px] font-black text-zinc-400 uppercase">Operational Zone</span>
            <span id="footer-day" class="text-sm font-black text-zinc-900 tracking-tight">Loading...</span>
        </div>
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="w-10 h-10 bg-zinc-100 rounded-xl flex items-center justify-center font-bold text-zinc-400">↑</button>
    </div>

    <script>
        const apiKey = "";
        let currentLang = 'en';
        let currentDayId = 1;

        const translations = {
            en: {
                steps: "STEPS",
                metabolism: "Physical Metabolism Analysis",
                opZone: "Operational Zone",
                fieldOps: "FIELD OPS",
                hito: "Street Art Hito",
                dep: "Dep",
                fromHostel: "From Hostel",
                cosmovision: "Cosmovision",
                drivers: "Driving Factors",
                aesthetics: "Aesthetic Language",
                listen: "Listen AI Summary",
                generating: "Generating Audio...",
                error: "Error generating audio."
            },
            es: {
                steps: "PASOS",
                metabolism: "Análisis de Metabolismo Físico",
                opZone: "Zona Operacional",
                fieldOps: "OPERACIONES DE CAMPO",
                hito: "Hito de Arte Urbano",
                dep: "Sal",
                fromHostel: "Desde Hostal",
                cosmovision: "Cosmovisión",
                drivers: "Motores de Diseño",
                aesthetics: "Lenguaje Estético",
                listen: "Escuchar Resumen IA",
                generating: "Generando Audio...",
                error: "Error al generar audio."
            }
        };

        const masterItinerary = [
            { id: 1, date: "Apr 18", title_en: "Adaptive Reuse: Bayswater", title_es: "Reutilización Adaptativa: Bayswater", steps: 5000, 
              schedule: [
                { 
                  time: "19:00", 
                  dep_en: "18:50 (From Hostel)", dep_es: "18:50 (Desde Hostal)",
                  act_en: "Check-in: Smart Hyde Park Inn", act_es: "Check-in: Smart Hyde Park Inn",
                  loc: "Smart Hyde Park Inn London", 
                  note_en: "Setup base.", note_es: "Establecer base.",
                  analysis: {
                    cosmovision_en: "This site embodies the concept of the 'Urban Micro-Cell'. It explores how dense Victorian domestic architecture can be surgically adapted to serve as a node for global, low-budget nomadic flow. It is architecture as a functional transit point rather than a permanent destination.",
                    cosmovision_es: "Este sitio encarna el concepto de la 'Micro-Célula Urbana'. Explora cómo la densa arquitectura doméstica victoriana puede adaptarse quirúrgicamente para servir como nodo para el flujo nómada global de bajo presupuesto. Es arquitectura como punto de tránsito funcional en lugar de destino permanente.",
                    driver_en: "The driving force is the intersection of urban real-estate pressure and the democratization of international travel. The conversion focuses on maximum partitioning efficiency within a legacy shell, balancing heritage preservation with the logistics of high-turnover occupancy.",
                    driver_es: "El motor es la intersección de la presión inmobiliaria urbana y la democratización de los viajes internacionales. La conversión se centra en la máxima eficiencia de compartimentación dentro de una cáscara legada, equilibrando la preservación del patrimonio con la logística de la ocupación de alta rotación.",
                    aesthetics_en: "A classic Stucco-fronted terrace that masks a hyper-rationalized internal layout. The aesthetics are defined by the contrast between the generous, high-ceilinged Victorian 'grandeur' of the facade and the compressed, utilitarian ergonomics of modern hostel spatial planning.",
                    aesthetics_es: "Una clásica terraza con frente de estuco que oculta una distribución interna hiper-racionalizada. La estética se define por el contraste entre la generosa 'grandeza' victoriana de techos altos de la fachada y la ergonomía utilitaria comprimida de la planificación espacial de un hostal moderno."
                  }
                },
                { 
                  time: "19:45", 
                  dep_en: "19:35", dep_es: "19:35",
                  act_en: "Survey: Whiteleys", act_es: "Inspección: Whiteleys",
                  loc: "Whiteleys London", 
                  note_en: "Adaptive reuse study.", note_es: "Estudio de reutilización adaptativa.",
                  analysis: {
                    cosmovision_en: "Foster + Partners propose the 'Second Life' of heritage. The building is treated as an architectural palimpsest where the courtyard acts as a lung, breathing modern light into a fossilized retail shell. It represents the shift from 'Cathedrals of Commerce' to integrated 'Luxury Ecosystems'.",
                    cosmovision_es: "Foster + Partners proponen la 'Segunda Vida' del patrimonio. El edificio es tratado como un palimpsesto arquitectónico donde el patio actúa como un pulmón, insuflando luz moderna en una cáscara comercial fosilizada. Representa el cambio de las 'Catedrales del Comercio' a 'Ecosistemas de Lujo' integrados.",
                    driver_en: "Driven by the collapse of the 20th-century department store model. The project responds to the urgent need to reclaim massive urban voids for high-density, mixed-use luxury housing, ensuring that historic landmarks remain relevant in a post-retail economy.",
                    driver_es: "Impulsado por el colapso del modelo de grandes almacenes del siglo XX. El proyecto responde a la necesidad urgente de reclamar enormes vacíos urbanos para viviendas de lujo de alta densidad y uso mixto, asegurando que los hitos históricos sigan siendo relevantes en una economía post-comercial.",
                    aesthetics_en: "A dramatic internal insertion of high-tech glass, timber, and steel into the 1911 Grade II neoclassical facade. The aesthetic tension lies in the dialogue between the heavy Portland stone shell and the lightweight, transparent structural interventions of the new central atrium.",
                    aesthetics_es: "Una dramática inserción interna de vidrio de alta tecnología, madera y acero en la fachada neoclásica de 1911 (Grado II). La tensión estética reside en el diálogo entre la pesada cáscara de piedra de Portland y las intervenciones estructurales ligeras y transparentes del nuevo atrio central."
                  }
                }
              ], banksy_en: "The Painter (Notting Hill) - Stencil of a painter writing 'Banksy' on the wall.", banksy_es: "El Pintor (Notting Hill) - Estarcido de un pintor escribiendo 'Banksy' en la pared." },
            
            { id: 2, date: "Apr 19", title_en: "Brutalist Urbanism", title_es: "Urbanismo Brutalista", steps: 18000, 
              schedule: [
                { 
                  time: "11:00", 
                  dep_en: "09:45", dep_es: "09:45",
                  act_en: "Hito: National Theatre", act_es: "Hito: National Theatre",
                  loc: "National Theatre London", 
                  note_en: "Concrete layering study.", note_es: "Estudio de capas de hormigón.",
                  analysis: {
                    cosmovision_en: "Denys Lasdun conceived this as 'Urban Strata'. Architecture is seen as a man-made geological formation, an extension of the river’s edge that invites the public to move vertically through the city. The 'fourth wall' of the theater is the South Bank itself.",
                    cosmovision_es: "Denys Lasdun concibió esto como 'Estratos Urbanos'. La arquitectura se ve como una formación geológica artificial, una extensión de la orilla del río que invita al público a moverse verticalmente por la ciudad. La 'cuarta pared' del teatro es el propio South Bank.",
                    driver_en: "A post-war social democratic mission to build secular temples for the arts. The goal was to reject the elitism of the West End by creating an 'open landscape' where structural guts are exposed and balconies act as public sidewalks for all citizens.",
                    driver_es: "Una misión socialdemócrata de posguerra para construir templos seculares para las artes. El objetivo era rechazar el elitismo del West End creando un 'paisaje abierto' donde las tripas estructurales quedan expuestas y los balcones actúan como aceras públicas para todos los ciudadanos.",
                    aesthetics_en: "The ultimate 'Béton Brut'. Its beauty lies in the board-marked concrete textures that mirror wood grain, the sharp interplay of interlocking horizontal volumes, and the deep, cinematic shadows cast by its overhanging terraces against the London sky.",
                    aesthetics_es: "El 'Béton Brut' definitivo. Su belleza reside en las texturas de hormigón marcadas por las tablas que imitan la veta de la madera, el afilado juego de volúmenes horizontales entrelazados y las sombras profundas y cinematográficas proyectadas por sus terrazas voladizas contra el cielo de Londres."
                  }
                }
              ], banksy_en: "Leake Street Tunnel - Banksy's 'Cans Festival' site.", banksy_es: "Túnel de Leake Street - Sitio del 'Cans Festival' de Banksy." }
            // ... (rest of the itinerary simplified for brevity in this example, same logic applies)
        ];

        // API Call with Exponential Backoff
        async function fetchWithRetry(url, options, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error("API Error");
                    return await response.json();
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        }

        async function playAISummary(nodeIndex) {
            const dayData = masterItinerary.find(d => d.id === currentDayId);
            const node = dayData.schedule[nodeIndex];
            const btn = document.getElementById(`audio-btn-${nodeIndex}`);
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<div class="loader"></div> <span>${translations[currentLang].generating}</span>`;

            try {
                // 1. Generate Elaborated Text
                const textPrompt = `As an expert architect, provide an elaborate 45-second narration about ${node.loc}. 
                Focus on its cosmovision, drivers, and aesthetics based on these details: 
                Cosmo: ${node.analysis['cosmovision_'+currentLang]}, 
                Driver: ${node.analysis['driver_'+currentLang]}, 
                Aesthetics: ${node.analysis['aesthetics_'+currentLang]}. 
                Speak in ${currentLang === 'en' ? 'English' : 'Spanish'}. Do not use markdown or symbols, only plain text.`;

                const textResult = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: textPrompt }] }] })
                });

                const script = textResult.candidates[0].content.parts[0].text;

                // 2. Generate TTS Audio
                const voice = currentLang === 'en' ? 'Zephyr' : 'Algieba';
                const ttsResult = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: script }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } }
                        },
                        model: "gemini-2.5-flash-preview-tts"
                    })
                });

                const base64Audio = ttsResult.candidates[0].content.parts[0].inlineData.data;
                const pcmData = Uint8Array.from(atob(base64Audio), c => c.charCodeAt(0));
                const wavBuffer = pcmToWav(pcmData.buffer, 24000); // 24kHz is standard for this model
                
                const blob = new Blob([wavBuffer], { type: 'audio/wav' });
                const url = URL.createObjectURL(blob);
                const audio = new Audio(url);
                audio.play();

                audio.onended = () => {
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                };

            } catch (error) {
                console.error(error);
                btn.innerHTML = `⚠️ ${translations[currentLang].error}`;
                setTimeout(() => { btn.disabled = false; btn.innerHTML = originalText; }, 3000);
            }
        }

        // Helper: Convert PCM to WAV for browser playback
        function pcmToWav(pcmBuffer, sampleRate) {
            const buffer = new Int16Array(pcmBuffer);
            const wavHeader = new ArrayBuffer(44 + buffer.length * 2);
            const view = new DataView(wavHeader);

            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };

            writeString(0, 'RIFF');
            view.setUint32(4, 32 + buffer.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, buffer.length * 2, true);

            let offset = 44;
            for (let i = 0; i < buffer.length; i++, offset += 2) view.setInt16(offset, buffer[i], true);

            return wavHeader;
        }

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('btn-en').className = lang === 'en' ? 'text-[10px] font-bold px-2 py-1 rounded bg-zinc-900 text-white' : 'text-[10px] font-bold px-2 py-1 rounded bg-zinc-100 text-zinc-400';
            document.getElementById('btn-es').className = lang === 'es' ? 'text-[10px] font-bold px-2 py-1 rounded bg-zinc-900 text-white' : 'text-[10px] font-bold px-2 py-1 rounded bg-zinc-100 text-zinc-400';
            
            document.getElementById('metabolism-label').innerText = translations[lang].metabolism;
            document.getElementById('op-zone-label').innerText = translations[lang].opZone;
            
            selectDay(currentDayId);
        }

        function init() {
            renderTabs();
            renderChart();
            selectDay(1);
        }

        function renderTabs() {
            const container = document.getElementById('tab-container');
            masterItinerary.forEach(d => {
                const b = document.createElement('button');
                b.id = `tab-${d.id}`;
                b.className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all opacity-40";
                b.innerText = d.date;
                b.onclick = () => selectDay(d.id);
                container.appendChild(b);
            });
        }

        let loadChart;
        function renderChart() {
            const ctx = document.getElementById('loadChart').getContext('2d');
            loadChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: masterItinerary.map(d => d.date),
                    datasets: [{
                        data: masterItinerary.map(d => d.steps),
                        backgroundColor: '#e4e4e7',
                        hoverBackgroundColor: '#e11d48',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false, beginAtZero: true } }
                }
            });
        }

        function selectDay(id) {
            currentDayId = id;
            const data = masterItinerary.find(d => d.id === id);
            const t = translations[currentLang];
            
            masterItinerary.forEach(d => document.getElementById(`tab-${d.id}`).className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all opacity-40");
            const active = document.getElementById(`tab-${id}`);
            active.className = "px-6 py-4 text-[10px] font-black uppercase tracking-tighter transition-all active-tab";
            active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

            document.getElementById('step-badge').innerText = `${data.steps.toLocaleString()} ${t.steps}`;
            document.getElementById('footer-day').innerText = `${data.date}: ${data['title_'+currentLang]}`;

            const content = document.getElementById('day-content');
            content.innerHTML = `
                <div class="mb-8">
                    <h3 class="text-4xl font-black text-zinc-900 leading-none tracking-tighter mb-2">${data['title_'+currentLang]}</h3>
                    <p class="text-[10px] font-black text-zinc-400 uppercase tracking-[0.2em]">${data.date} • ${t.fieldOps}</p>
                </div>

                <div class="space-y-8">
                    ${data.schedule.map((node, index) => `
                        <div class="timeline-item">
                            <div class="flex justify-between items-baseline mb-2">
                                <div class="flex items-center gap-2">
                                    <span class="text-[9px] font-black text-rose-600 bg-rose-50 px-2 py-0.5 rounded uppercase tracking-widest">${node.time}</span>
                                    <span class="departure-tag uppercase tracking-tighter">${t.dep}: ${node['dep_'+currentLang]}</span>
                                </div>
                                <span class="text-[8px] font-bold text-zinc-300 uppercase">Seq 0${index + 1}</span>
                            </div>
                            
                            <h4 class="font-black text-zinc-800 text-lg leading-tight mb-1">${node['act_'+currentLang]}</h4>
                            <p class="text-xs text-zinc-500 mb-3 leading-relaxed">${node['note_'+currentLang]}</p>

                            <section class="arch-card mb-4">
                                <div class="grid grid-cols-1 gap-4">
                                    <div>
                                        <span class="section-label">${t.cosmovision}</span>
                                        <p class="text-[11px] text-zinc-600 leading-relaxed italic border-l-2 border-zinc-100 pl-3">${node.analysis['cosmovision_'+currentLang]}</p>
                                    </div>
                                    <div>
                                        <span class="section-label">${t.drivers}</span>
                                        <p class="text-[11px] text-zinc-600 leading-relaxed pl-3">${node.analysis['driver_'+currentLang]}</p>
                                    </div>
                                    <div>
                                        <span class="section-label">${t.aesthetics}</span>
                                        <p class="text-[11px] text-zinc-800 leading-relaxed font-medium pl-3 bg-zinc-50 rounded-md py-1">${node.analysis['aesthetics_'+currentLang]}</p>
                                    </div>
                                </div>
                            </section>
                            
                            <button id="audio-btn-${index}" onclick="playAISummary(${index})" class="audio-btn">
                                🔊 <span>${t.listen}</span>
                            </button>

                            <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(node.loc)}" 
                               target="_blank" class="map-btn">
                               📍 GPS Walk Navigation
                            </a>
                        </div>
                    `).join('')}
                </div>

                <div class="banksy-box shadow-xl">
                    <div class="flex items-center gap-2 mb-4">
                        <div class="w-1.5 h-6 bg-rose-600"></div>
                        <span class="text-[10px] font-black uppercase tracking-[0.2em] text-rose-500">${t.hito}</span>
                    </div>
                    <p class="text-sm font-medium italic text-zinc-300 leading-relaxed">"${data['banksy_'+currentLang]}"</p>
                </div>
            `;

            loadChart.data.datasets[0].backgroundColor = masterItinerary.map(d => d.id === id ? '#e11d48' : '#e4e4e7');
            loadChart.update();
        }

        window.onload = init;
    </script>
</body>
</html>
